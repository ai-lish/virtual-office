<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copilot 使用面板 — Virtual Office</title>
  <!-- Inter font for the panel -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Copilot panel styles -->
  <link rel="stylesheet" href="../css/copilot-panel.css">
  <style>
    /* Light theme toggle — add ?theme=light to URL to activate */
    body.theme-light {
      background: #F0F2F5;
    }
  </style>
</head>
<body>
  <!-- ─── Copilot Panel Root ─────────────────────────────── -->
  <div id="copilot-panel-root" class="copilot-panel" role="main">

    <!-- Content injected by CopilotPanel JS -->
    <div style="display:flex;align-items:center;justify-content:center;height:400px;color:var(--copilot-text-muted);font-size:14px;">
      <span>載入中…</span>
    </div>

  </div>

  <!-- ─── Scripts ───────────────────────────────────────── -->
  <script src="../js/copilot-panel.js"></script>
  <script>
    // Theme: add ?theme=light to URL to switch
    const params = new URLSearchParams(location.search);
    if (params.get('theme') === 'light') {
      document.body.classList.add('theme-light');
      document.querySelector('#copilot-panel-root')?.classList.add('theme-light');
    }

    // Boot the panel
    document.addEventListener('DOMContentLoaded', () => {
      const panel = new CopilotPanel('#copilot-panel-root');
      panel.init();
      // Expose globally for console debugging
      window.__copilotPanel = panel;
    });
  </script>
</body>
</html>
