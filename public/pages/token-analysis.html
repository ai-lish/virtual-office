<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Token 使用儀表板</title>
  <link rel="stylesheet" href="../css/token-dashboard.css">
</head>
<body>
  <div class="token-dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <h1 class="dashboard-title">
        <span class="emoji">🤖</span>
        AI Token 使用儀表板
      </h1>
      <div class="dashboard-controls" role="region" aria-label="Dashboard controls">
        <label for="start-date" class="visually-hidden">Start date</label>
        <input type="date" id="start-date" placeholder="Start Date" aria-label="Start date">
        <label for="end-date" class="visually-hidden">End date</label>
        <input type="date" id="end-date" placeholder="End Date" aria-label="End date">
        <label for="period-select" class="visually-hidden">Period</label>
        <select id="period-select" aria-label="Period selector">
          <option value="hourly">每小時</option>
          <option value="daily" selected>每日</option>
          <option value="weekly">每週</option>
        </select>
        <button class="btn btn-secondary" id="refresh-btn" aria-label="刷新數據">
          🔄 刷新
        </button>
        <label for="export-format" class="visually-hidden">Export format</label>
        <select id="export-format" aria-label="Export format">
          <option value="json">JSON</option>
          <option value="csv">CSV</option>
        </select>
        <button class="btn btn-primary" id="export-btn" aria-label="導出數據">
          📥 導出
        </button>
      </div>
    </header>

    <!-- Loading State -->
    <div id="loading" class="loading" style="display: flex; justify-content: center; align-items: center; min-height: 200px;">
      <div style="text-align: center;">
        <div style="font-size: 2rem;">⏳</div>
        <div style="margin-top: 10px;">載入中...</div>
        <div id="loading-status" style="margin-top: 5px; font-size: 0.8em; color: var(--token-text-muted);">連接中...</div>
      </div>
    </div>

    <!-- Error State -->
    <div id="error-message" class="error-message" style="display: none; padding: 20px; background: #ED4245; color: white; border-radius: 8px; margin: 20px;"></div>

    <!-- KPI Cards -->
    <section class="section">
      <h2 class="section-title">📊 關鍵指標</h2>
      <div id="kpi-cards" class="kpi-grid">
        <div class="kpi-card">
          <div class="label">⚡ 載入中...</div>
          <div class="value">-</div>
        </div>
      </div>
    </section>

    <!-- Charts Grid -->
    <section class="section">
      <h2 class="section-title">📈 使用趨勢</h2>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">📊 Token 使用趨勢 (每日)</div>
          <div id="trend-chart" class="chart-container">
            <pre class="ascii-chart">Loading...</pre>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-title">📊 每日用量 (近14日)</div>
          <div id="daily-chart" class="chart-container"></div>
        </div>
      </div>
    </section>

    <!-- Distribution Charts -->
    <section class="section">
      <h2 class="section-title">🥧 分佈分析</h2>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">🔗 按 API 分佈</div>
          <div id="api-dist-chart" class="chart-container"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">🤖 按 Model 分佈</div>
          <div id="model-dist-chart" class="chart-container"></div>
        </div>
      </div>
    </section>

    <!-- Heatmap and Cache -->
    <section class="section">
      <h2 class="section-title">⚡ 效能分析</h2>
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">🕐 24小時使用熱力圖</div>
          <div id="heatmap-chart" class="heatmap-container"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">💾 Cache 命中率</div>
          <div id="cache-meter" class="chart-container"></div>
        </div>
      </div>
    </section>

    <!-- VLM Panel -->
    <section class="section">
      <h2 class="section-title">🖼️ VLM 圖像使用分析</h2>
      <div class="chart-card">
        <div id="vlm-panel" class="distribution-grid">
          <div class="distribution-item">
            <div class="distribution-color" style="background: #EB459E;"></div>
            <div class="distribution-info">
              <div class="distribution-name">Total VLM Calls</div>
              <div class="distribution-value">Loading...</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer style="text-align: center; padding: 40px 0; color: var(--token-text-muted); font-size: 12px;">
      <p>Phase 11: Minimax Token 使用情況分析系統</p>
      <p>數據每小時自動更新 | 最後更新: <span id="last-updated">-</span></p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="../js/token-api.js"></script>
  <script src="../js/token-charts.js"></script>
  <script src="../js/token-dashboard.js"></script>
</body>
</html>
