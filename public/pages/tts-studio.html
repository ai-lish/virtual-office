<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniMax TTS Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0f0f14',
                        panelBg: '#1a1a24',
                        borderCol: '#2a2a3a',
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' },
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0f0f14; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        input, select, textarea, button { font-family: inherit; }
        .spinner { border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .wave-bar { animation: wave 1s ease-in-out infinite; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }
        .step-circle { transition: all 0.3s ease; }
        .step-active { background: #0284c7; box-shadow: 0 0 20px rgba(2, 132, 199, 0.5); }
        .step-done { background: #10b981; }
        .step-pending { background: #374151; }
        .wizard-step { display: none; }
        .wizard-step.active { display: block; }
        .btn-primary { background: linear-gradient(135deg, #0284c7, #0369a1); }
        .btn-primary:hover { background: linear-gradient(135deg, #0369a1, #0284c7); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">
                <i class="fa-solid fa-microphone-lines text-brand-400 mr-2"></i>
                MiniMax TTS Studio
            </h1>
            <p class="text-gray-400 text-sm">5-Step Wizard · 專業語音合成工作坊</p>
        </header>

        <!-- API Key Setup (Always Visible) -->
        <div id="apiKeySection" class="bg-panelBg border border-borderCol rounded-2xl p-6 mb-6">
            <div class="flex flex-col md:flex-row md:items-center gap-4">
                <div class="flex-1">
                    <label class="text-xs font-bold text-gray-400 mb-1 block">API Key</label>
                    <div class="flex gap-2">
                        <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxx" 
                            class="flex-1 bg-darkBg border border-borderCol rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-brand-500">
                        <button id="toggleKeyBtn" class="px-3 bg-darkBg border border-borderCol rounded-xl hover:border-gray-500 transition">
                            <i class="fa-regular fa-eye text-gray-400"></i>
                        </button>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
                        <input type="checkbox" id="rememberKeyToggle" class="w-4 h-4 rounded border-gray-600 bg-darkBg checked:bg-brand-600">
                        記住
                    </label>
                    <button id="connectKeyBtn" class="btn-primary text-white px-6 py-2.5 rounded-xl font-semibold text-sm transition">
                        連接
                    </button>
                </div>
            </div>
            <div id="connectionStatus" class="mt-3 flex items-center gap-2 text-xs text-red-400 hidden">
                <span class="w-2 h-2 rounded-full bg-red-500"></span>
                <span id="statusText">未連線</span>
            </div>
        </div>

        <!-- 5-Step Wizard -->
        <div id="wizardContainer" class="hidden">
            <!-- Progress Bar -->
            <div class="bg-panelBg border border-borderCol rounded-2xl p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-xs font-bold text-gray-400">製作進度</span>
                    <span id="progressText" class="text-xs text-brand-400">步驟 1/5</span>
                </div>
                <div class="flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2 flex-1">
                        <div id="step1Circle" class="step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white step-active">1</div>
                        <div class="flex-1 h-1 bg-borderCol rounded"><div id="progress1" class="h-full bg-brand-500 rounded transition-all" style="width:0%"></div></div>
                    </div>
                    <div class="flex items-center gap-2 flex-1">
                        <div id="step2Circle" class="step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white step-pending">2</div>
                        <div class="flex-1 h-1 bg-borderCol rounded"><div id="progress2" class="h-full bg-brand-500 rounded transition-all" style="width:0%"></div></div>
                    </div>
                    <div class="flex items-center gap-2 flex-1">
                        <div id="step3Circle" class="step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white step-pending">3</div>
                        <div class="flex-1 h-1 bg-borderCol rounded"><div id="progress3" class="h-full bg-brand-500 rounded transition-all" style="width:0%"></div></div>
                    </div>
                    <div class="flex items-center gap-2 flex-1">
                        <div id="step4Circle" class="step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white step-pending">4</div>
                        <div class="flex-1 h-1 bg-borderCol rounded"><div id="progress4" class="h-full bg-brand-500 rounded transition-all" style="width:0%"></div></div>
                    </div>
                    <div id="step5Circle" class="step-circle w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold text-white step-pending">5</div>
                </div>
            </div>

            <!-- Step 1: 選擇語音模型 -->
            <div id="step1" class="wizard-step active">
                <div class="bg-panelBg border border-borderCol rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-white mb-4">
                        <i class="fa-solid fa-robot text-brand-400 mr-2"></i>
                        Step 1: 選擇語音模型
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <label class="model-card cursor-pointer">
                            <input type="radio" name="model" value="speech-2.8-hd" class="hidden peer" checked>
                            <div class="border border-borderCol rounded-xl p-4 peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="font-semibold text-white">speech-2.8-hd</span>
                                    <span class="text-[10px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded">推薦</span>
                                </div>
                                <p class="text-xs text-gray-400">超擬真高清 · 支援 Sound Tags</p>
                            </div>
                        </label>
                        <label class="model-card cursor-pointer">
                            <input type="radio" name="model" value="speech-2.8-turbo" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="font-semibold text-white">speech-2.8-turbo</span>
                                </div>
                                <p class="text-xs text-gray-400">極速流暢版</p>
                            </div>
                        </label>
                        <label class="model-card cursor-pointer">
                            <input type="radio" name="model" value="speech-2.6-hd" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <span class="font-semibold text-white">speech-2.6-hd</span>
                                <p class="text-xs text-gray-400 mt-1">高相似度極致高清</p>
                            </div>
                        </label>
                        <label class="model-card cursor-pointer">
                            <input type="radio" name="model" value="speech-2.6-turbo" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <span class="font-semibold text-white">speech-2.6-turbo</span>
                                <p class="text-xs text-gray-400 mt-1">極致性價比</p>
                            </div>
                        </label>
                    </div>
                    <button onclick="nextStep(1)" class="w-full btn-primary text-white py-3 rounded-xl font-semibold mt-6 transition">
                        下一步 <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- Step 2: 選擇音色 -->
            <div id="step2" class="wizard-step">
                <div class="bg-panelBg border border-borderCol rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-white mb-4">
                        <i class="fa-solid fa-user-voice text-brand-400 mr-2"></i>
                        Step 2: 選擇音色
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                        <!-- Cantonese Voices -->
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="Cantonese_ProfessionalHost_M" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-500/10 transition">
                                <div class="text-2xl mb-2">🎙️</div>
                                <div class="font-semibold text-white text-sm">粵語主播</div>
                                <div class="text-[10px] text-gray-500">Cantonese Host</div>
                            </div>
                        </label>
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="Cantonese_NewsAnchor_M" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-500/10 transition">
                                <div class="text-2xl mb-2">📰</div>
                                <div class="font-semibold text-white text-sm">粵語新聞</div>
                                <div class="text-[10px] text-gray-500">Cantonese News</div>
                            </div>
                        </label>
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="Cantonese_Conversational_F" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-emerald-500 peer-checked:bg-emerald-500/10 transition">
                                <div class="text-2xl mb-2">💬</div>
                                <div class="font-semibold text-white text-sm">粵語對話</div>
                                <div class="text-[10px] text-gray-500">Cantonese Conv</div>
                            </div>
                        </label>
                        <!-- Mandarin Voices -->
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="chinese_female_1_v1" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <div class="text-2xl mb-2">👩</div>
                                <div class="font-semibold text-white text-sm">中文女聲</div>
                                <div class="text-[10px] text-gray-500">Chinese Female</div>
                            </div>
                        </label>
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="chinese_male_1_v1" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-brand-500 peer-checked:bg-brand-500/10 transition">
                                <div class="text-2xl mb-2">👨</div>
                                <div class="font-semibold text-white text-sm">中文男聲</div>
                                <div class="text-[10px] text-gray-500">Chinese Male</div>
                            </div>
                        </label>
                        <!-- English Voices -->
                        <label class="voice-card cursor-pointer">
                            <input type="radio" name="voice" value="English_expressive_narrator" class="hidden peer">
                            <div class="border border-borderCol rounded-xl p-4 text-center peer-checked:border-purple-500 peer-checked:bg-purple-500/10 transition">
                                <div class="text-2xl mb-2">🎭</div>
                                <div class="font-semibold text-white text-sm">英語敘事</div>
                                <div class="text-[10px] text-gray-500">English Narrator</div>
                            </div>
                        </label>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="prevStep(2)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold transition">
                            <i class="fa-solid fa-arrow-left mr-2"></i> 上一步
                        </button>
                        <button onclick="nextStep(2)" class="flex-1 btn-primary text-white py-3 rounded-xl font-semibold transition">
                            下一步 <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Step 3: 語速與風格 -->
            <div id="step3" class="wizard-step">
                <div class="bg-panelBg border border-borderCol rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-white mb-4">
                        <i class="fa-solid fa-gauge-high text-brand-400 mr-2"></i>
                        Step 3: 語速與風格
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="text-sm font-semibold text-gray-300 mb-2 block">語速: <span id="speedValue" class="text-brand-400">1.0x</span></label>
                            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" 
                                class="w-full h-2 bg-borderCol rounded-lg appearance-none cursor-pointer accent-brand-500">
                            <div class="flex justify-between text-xs text-gray-500 mt-1">
                                <span>0.5x (慢)</span>
                                <span>1.0x (正常)</span>
                                <span>2.0x (快)</span>
                            </div>
                        </div>
                        <div id="emotionSection" class="hidden">
                            <label class="text-sm font-semibold text-gray-300 mb-2 block">情感風格 (2.8-hd)</label>
                            <div class="flex flex-wrap gap-2">
                                <button type="button" onclick="selectEmotion('neutral')" class="emotion-btn px-4 py-2 rounded-lg border border-borderCol text-sm hover:border-brand-500 transition" data-emotion="neutral">中性</button>
                                <button type="button" onclick="selectEmotion('happy')" class="emotion-btn px-4 py-2 rounded-lg border border-borderCol text-sm hover:border-brand-500 transition" data-emotion="happy">開心</button>
                                <button type="button" onclick="selectEmotion('sad')" class="emotion-btn px-4 py-2 rounded-lg border border-borderCol text-sm hover:border-brand-500 transition" data-emotion="sad">傷心</button>
                                <button type="button" onclick="selectEmotion('angry')" class="emotion-btn px-4 py-2 rounded-lg border border-borderCol text-sm hover:border-brand-500 transition" data-emotion="angry">憤怒</button>
                                <button type="button" onclick="selectEmotion('fearful')" class="emotion-btn px-4 py-2 rounded-lg border border-borderCol text-sm hover:border-brand-500 transition" data-emotion="fearful">害怕</button>
                            </div>
                        </div>
                    </div>
                    <div class="flex gap-3 mt-6">
                        <button onclick="prevStep(3)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold transition">
                            <i class="fa-solid fa-arrow-left mr-2"></i> 上一步
                        </button>
                        <button onclick="nextStep(3)" class="flex-1 btn-primary text-white py-3 rounded-xl font-semibold transition">
                            下一步 <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Step 4: 輸入文字 -->
            <div id="step4" class="wizard-step">
                <div class="bg-panelBg border border-borderCol rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-white mb-4">
                        <i class="fa-solid fa-keyboard text-brand-400 mr-2"></i>
                        Step 4: 輸入文字
                    </h2>
                    
                    <!-- Sound Tags (2.8-hd only) -->
                    <div id="soundTagsSection" class="mb-4 p-3 bg-amber-500/10 border border-amber-500/30 rounded-xl">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-bold text-amber-400"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>2.8-HD 專屬 Sound Tags</span>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button type="button" onclick="insertTag('[laughter]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">笑聲</button>
                            <button type="button" onclick="insertTag('[sigh]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">嘆氣</button>
                            <button type="button" onclick="insertTag('[whispering]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">低語</button>
                            <button type="button" onclick="insertTag('[gasp]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">吸氣</button>
                            <button type="button" onclick="insertTag('[cough]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">咳嗽</button>
                            <button type="button" onclick="insertTag('[clears throat]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">清嗓</button>
                            <button type="button" onclick="insertTag('[breathing]')" class="text-xs bg-slate-800 hover:bg-slate-700 text-white rounded px-2 py-1 transition">呼吸</button>
                        </div>
                    </div>

                    <textarea id="textInput" rows="6" placeholder="輸入你想轉換為語音的文字...&#10;&#10;範例：你好，歡迎來到 MiniMax TTS Studio。[laughter] 這是我為您動態生成的語音！" 
                        class="w-full bg-darkBg border border-borderCol rounded-xl p-4 text-sm focus:outline-none focus:border-brand-500 resize-none"></textarea>
                    
                    <div class="flex items-center justify-between mt-2 text-xs text-gray-500">
                        <span>字數: <span id="charCount">0</span></span>
                        <span>建議不超過 2000 字</span>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button onclick="prevStep(4)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold transition">
                            <i class="fa-solid fa-arrow-left mr-2"></i> 上一步
                        </button>
                        <button onclick="nextStep(4)" class="flex-1 btn-primary text-white py-3 rounded-xl font-semibold transition">
                            下一步 <i class="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Step 5: 生成與下載 -->
            <div id="step5" class="wizard-step">
                <div class="bg-panelBg border border-borderCol rounded-2xl p-6">
                    <h2 class="text-lg font-bold text-white mb-4">
                        <i class="fa-solid fa-wand-magic-sparkles text-brand-400 mr-2"></i>
                        Step 5: 生成語音
                    </h2>
                    
                    <!-- Summary -->
                    <div class="bg-darkBg rounded-xl p-4 mb-6">
                        <h3 class="text-sm font-semibold text-gray-400 mb-3">設定摘要</h3>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <div><span class="text-gray-500">模型:</span> <span id="summaryModel" class="text-white">-</span></div>
                            <div><span class="text-gray-500">音色:</span> <span id="summaryVoice" class="text-white">-</span></div>
                            <div><span class="text-gray-500">語速:</span> <span id="summarySpeed" class="text-white">-</span></div>
                            <div><span class="text-gray-500">情感:</span> <span id="summaryEmotion" class="text-white">-</span></div>
                            <div class="col-span-2"><span class="text-gray-500">字數:</span> <span id="summaryChars" class="text-white">-</span></div>
                        </div>
                    </div>

                    <!-- Generate Button -->
                    <button id="generateBtn" onclick="generateSpeech()" class="w-full btn-primary text-white py-4 rounded-xl font-bold text-lg transition mb-4">
                        <i class="fa-solid fa-bolt mr-2"></i> 開始合成
                    </button>

                    <!-- Progress -->
                    <div id="progressSection" class="hidden mb-6">
                        <div class="flex items-center gap-3">
                            <div class="spinner w-5 h-5"></div>
                            <span id="progressStatus" class="text-sm text-gray-300">合成中...</span>
                        </div>
                        <div class="w-full h-2 bg-borderCol rounded-full mt-2">
                            <div id="progressBar" class="h-full bg-brand-500 rounded-full transition-all" style="width:0%"></div>
                        </div>
                    </div>

                    <!-- Audio Output -->
                    <div id="audioOutput" class="hidden">
                        <div class="bg-emerald-500/10 border border-emerald-500/30 rounded-xl p-4 mb-4">
                            <div class="flex items-center gap-2 text-emerald-400 text-sm font-semibold mb-2">
                                <i class="fa-solid fa-check-circle"></i> 合成完成
                            </div>
                            <audio id="audioPlayer" controls class="w-full h-10"></audio>
                        </div>
                        <div class="flex gap-3">
                            <button id="downloadBtn" class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-semibold transition">
                                <i class="fa-solid fa-download mr-2"></i> 下載 MP3
                            </button>
                            <button onclick="resetWizard()" class="px-6 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold transition">
                                重新開始
                            </button>
                        </div>
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button onclick="prevStep(5)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-3 rounded-xl font-semibold transition">
                            <i class="fa-solid fa-arrow-left mr-2"></i> 上一步
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div id="toast" class="fixed bottom-4 right-4 px-4 py-3 rounded-xl text-sm font-semibold transform translate-y-20 opacity-0 transition-all duration-300 z-50"></div>
    </div>

    <script>
        // === 全域變數 ===
        let currentApiKey = '';
        let isApiKeyConnected = false;
        let isTokenPlanKey = false;
        let currentStep = 1;

        // 當前設定
        let settings = {
            model: 'speech-2.8-hd',
            voice: 'chinese_female_1_v1',
            speed: 1.0,
            emotion: 'neutral',
            text: ''
        };

        // === DOM Ready ===
        document.addEventListener('DOMContentLoaded', () => {
            // 嘗試恢復 API Key
            const savedKey = sessionStorage.getItem('minimax_api_key_masked');
            if (savedKey) {
                try {
                    const key = atob(savedKey);
                    document.getElementById('apiKeyInput').value = key;
                    currentApiKey = key;
                    connectApiKey();
                } catch (e) {
                    sessionStorage.removeItem('minimax_api_key_masked');
                }
            }

            // Speed slider
            document.getElementById('speedSlider').addEventListener('input', (e) => {
                settings.speed = parseFloat(e.target.value);
                document.getElementById('speedValue').textContent = settings.speed.toFixed(1) + 'x';
            });

            // Text area counter
            document.getElementById('textInput').addEventListener('input', (e) => {
                settings.text = e.target.value;
                document.getElementById('charCount').textContent = e.target.value.length;
            });

            // Connect button
            document.getElementById('connectKeyBtn').addEventListener('click', () => {
                const key = document.getElementById('apiKeyInput').value.trim();
                if (!key) {
                    showToast('請輸入 API Key', 'error');
                    return;
                }
                currentApiKey = key;
                if (document.getElementById('rememberKeyToggle').checked) {
                    sessionStorage.setItem('minimax_api_key_masked', btoa(key));
                }
                connectApiKey();
            });

            // Toggle key visibility
            document.getElementById('toggleKeyBtn').addEventListener('click', () => {
                const input = document.getElementById('apiKeyInput');
                const icon = document.getElementById('toggleKeyBtn').querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'fa-regular fa-eye-slash text-gray-400';
                } else {
                    input.type = 'password';
                    icon.className = 'fa-regular fa-eye text-gray-400';
                }
            });

            // Background cleanup - 10秒後銷毀 Key
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    window.keyTimer = setTimeout(() => {
                        if (document.visibilityState === 'hidden') {
                            currentApiKey = '';
                            isApiKeyConnected = false;
                            sessionStorage.removeItem('minimax_api_key_masked');
                            document.getElementById('apiKeyInput').value = '';
                            setConnectionStatus(false);
                            document.getElementById('wizardContainer').classList.add('hidden');
                        }
                    }, 10000);
                } else {
                    clearTimeout(window.keyTimer);
                }
            });
        });

        function connectApiKey() {
            isTokenPlanKey = currentApiKey.startsWith('sk-cp-');
            isApiKeyConnected = true;
            setConnectionStatus(true);
            document.getElementById('wizardContainer').classList.remove('hidden');
            showToast('API Key 已連接', 'success');
            updateSummary();
        }

        function setConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            const text = document.getElementById('statusText');
            if (connected) {
                status.classList.remove('hidden');
                status.classList.remove('text-red-400');
                status.classList.add('text-emerald-400');
                status.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span><span>已連線</span>';
            } else {
                status.classList.remove('hidden');
                status.classList.add('text-red-400');
                status.classList.remove('text-emerald-400');
                text.textContent = '未連線';
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'fixed bottom-4 right-4 px-4 py-3 rounded-xl text-sm font-semibold transform transition-all duration-300 z-50';
            if (type === 'success') {
                toast.classList.add('bg-emerald-600', 'text-white');
            } else if (type === 'error') {
                toast.classList.add('bg-red-600', 'text-white');
            } else {
                toast.classList.add('bg-gray-700', 'text-white');
            }
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // === Wizard Navigation ===
        function nextStep(current) {
            // Validation
            if (current === 1) {
                settings.model = document.querySelector('input[name="model"]:checked')?.value || 'speech-2.8-hd';
            } else if (current === 2) {
                const selected = document.querySelector('input[name="voice"]:checked');
                if (!selected) {
                    showToast('請選擇一個音色', 'error');
                    return;
                }
                settings.voice = selected.value;
            } else if (current === 3) {
                // Show emotion section for 2.8-hd
                document.getElementById('emotionSection').classList.toggle('hidden', settings.model !== 'speech-2.8-hd');
            } else if (current === 4) {
                if (!settings.text.trim()) {
                    showToast('請輸入文字', 'error');
                    return;
                }
                updateSummary();
            }

            goToStep(current + 1);
        }

        function prevStep(current) {
            goToStep(current - 1);
        }

        function goToStep(step) {
            // Hide all steps
            document.querySelectorAll('.wizard-step').forEach(el => el.classList.remove('active'));
            // Show target step
            document.getElementById(`step${step}`).classList.add('active');
            
            // Update progress circles
            for (let i = 1; i <= 5; i++) {
                const circle = document.getElementById(`step${i}Circle`);
                circle.classList.remove('step-active', 'step-done', 'step-pending');
                if (i < step) {
                    circle.classList.add('step-done');
                    circle.innerHTML = '<i class="fa-solid fa-check text-xs"></i>';
                } else if (i === step) {
                    circle.classList.add('step-active');
                    circle.textContent = i;
                } else {
                    circle.classList.add('step-pending');
                    circle.textContent = i;
                }
            }

            // Update progress bars
            for (let i = 1; i < step; i++) {
                document.getElementById(`progress${i}`).style.width = '100%';
            }

            document.getElementById('progressText').textContent = `步驟 ${step}/5`;
            currentStep = step;
        }

        function selectEmotion(emotion) {
            settings.emotion = emotion;
            document.querySelectorAll('.emotion-btn').forEach(btn => {
                btn.classList.remove('border-brand-500', 'bg-brand-500/20', 'text-brand-400');
                if (btn.dataset.emotion === emotion) {
                    btn.classList.add('border-brand-500', 'bg-brand-500/20', 'text-brand-400');
                }
            });
        }

        function insertTag(tag) {
            const textarea = document.getElementById('textInput');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + tag + text.substring(end);
            textarea.selectionStart = textarea.selectionEnd = start + tag.length;
            textarea.focus();
            settings.text = textarea.value;
            document.getElementById('charCount').textContent = textarea.value.length;
        }

        function updateSummary() {
            document.getElementById('summaryModel').textContent = settings.model;
            document.getElementById('summaryVoice').textContent = settings.voice;
            document.getElementById('summarySpeed').textContent = settings.speed.toFixed(1) + 'x';
            document.getElementById('summaryEmotion').textContent = settings.emotion;
            document.getElementById('summaryChars').textContent = settings.text.length + ' 字';
        }

        // === Generate Speech ===
        async function generateSpeech() {
            if (!isApiKeyConnected || !currentApiKey) {
                showToast('請先連接 API Key', 'error');
                return;
            }

            const generateBtn = document.getElementById('generateBtn');
            const progressSection = document.getElementById('progressSection');
            const audioOutput = document.getElementById('audioOutput');

            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="spinner inline-block w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin mr-2"></span> 合成中...';
            progressSection.classList.remove('hidden');

            const payload = {
                model: settings.model,
                text: settings.text,
                voice: settings.voice,
                speed: settings.speed,
                bitrate: 128000,
                sample_rate: 32000,
                format: 'mp3'
            };

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 120000);

                const response = await fetch('https://api.minimax.io/v1/t2a_v2', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + currentApiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });

                clearTimeout(timeout);

                if (response.status === 429) {
                    // 429 Retry with exponential backoff
                    let retries = 0;
                    while (retries < 5 && response.status === 429) {
                        await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                        retries++;
                        const retryResponse = await fetch('https://api.minimax.io/v1/t2a_v2', {
                            method: 'POST',
                            headers: {
                                'Authorization': 'Bearer ' + currentApiKey,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify(payload)
                        });
                        if (retryResponse.ok) {
                            handleAudioResponse(retryResponse);
                            return;
                        }
                    }
                    throw new Error('Rate limit exceeded after retries');
                }

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error?.message || `HTTP ${response.status}`);
                }

                handleAudioResponse(response);

            } catch (error) {
                showToast('合成失敗: ' + error.message, 'error');
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> 開始合成';
                progressSection.classList.add('hidden');
            }

            function handleAudioResponse(response) {
                response.blob().then(blob => {
                    const url = URL.createObjectURL(blob);
                    const audio = document.getElementById('audioPlayer');
                    audio.src = url;

                    document.getElementById('downloadBtn').onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `tts-${Date.now()}.mp3`;
                        a.click();
                    };

                    audioOutput.classList.remove('hidden');
                    progressSection.classList.add('hidden');
                    generateBtn.disabled = false;
                    generateBtn.innerHTML = '<i class="fa-solid fa-bolt mr-2"></i> 開始合成';
                    showToast('語音合成成功！', 'success');
                });
            }
        }

        function resetWizard() {
            currentStep = 1;
            settings = { model: 'speech-2.8-hd', voice: 'chinese_female_1_v1', speed: 1.0, emotion: 'neutral', text: '' };
            document.getElementById('textInput').value = '';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('speedSlider').value = 1.0;
            document.getElementById('speedValue').textContent = '1.0x';
            document.getElementById('audioOutput').classList.add('hidden');
            goToStep(1);
            document.querySelectorAll('input[name="model"]')[0].checked = true;
            document.querySelectorAll('input[name="voice"]')[3].checked = true;
        }
    </script>
</body>
