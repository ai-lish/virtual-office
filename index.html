<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 虛擬辦公室</title>
    <link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#16213e;--bar-bg:#0a1628;--text:#eee;--dim:#888;--red:#bc002d;--green:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--blue:#3498db;--purple:#9b59b6}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,#1a1a2e,#16213e);border-bottom:2px solid var(--red);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
.header-logo{width:32px;height:32px;border-radius:6px;vertical-align:middle}
.header-right{display:flex;align-items:center;gap:14px}
.header-right .update{font-size:.72em;color:var(--dim)}
.header-right a{color:#fff;text-decoration:none;font-size:.9em;padding:5px 14px;border:1px solid rgba(255,255,255,.25);border-radius:18px;transition:all .2s;font-weight:600}
.header-right a:hover{color:#fff;border-color:var(--red)}

.container{max-width:800px;margin:0 auto;padding:24px 16px 60px}

.quota-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
.quota-card{background:var(--card);border-radius:12px;padding:20px;border-left:4px solid var(--green);transition:border-color .3s}
.quota-card .label{font-size:.72em;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.quota-card .period{font-size:.65em;color:var(--dim);font-weight:400;text-transform:none;letter-spacing:0}
.quota-card .numbers{font-size:1.15rem;font-weight:700;margin-bottom:10px}
.quota-card .numbers .remaining{color:var(--green)}
.quota-card .track{height:7px;background:var(--bar-bg);border-radius:4px;overflow:hidden;margin-bottom:6px}
.quota-card .fill{height:100%;border-radius:4px;transition:width .6s ease,background .3s}
.quota-card .pct{font-size:.72em;color:var(--dim)}
/* ── Agent usage grid (compact 4-card) ── */
.agent-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:32px}
.agent-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;min-width:0;transition:border-color .2s}
.agent-card.is-muted{opacity:.65}
.agent-card.is-error{border-color:rgba(231,76,60,.45)}
.agent-card.is-stale{border-color:rgba(243,156,18,.45)}
.agent-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
.agent-title{font-size:.9rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-badge{font-size:.65em;color:var(--dim);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:2px 7px;white-space:nowrap}
.agent-metric{margin-bottom:8px}
.agent-row{display:flex;justify-content:space-between;gap:8px;font-size:.72em;color:var(--dim);margin-bottom:4px}
.agent-row strong{color:var(--text);font-variant-numeric:tabular-nums}
.agent-track{height:6px;background:var(--bar-bg);border-radius:4px;overflow:hidden}
.agent-fill{height:100%;border-radius:4px;transition:width .5s ease,background .2s}
.agent-footer{display:flex;justify-content:space-between;gap:8px;margin-top:8px;font-size:.68em;color:var(--dim)}
.agent-footer a{color:var(--blue);text-decoration:none}
.agent-footer a:hover{text-decoration:underline}
@media(max-width:760px){.agent-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:480px){.agent-grid{grid-template-columns:1fr}}
.detail-quota-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px}
.detail-quota-card{background:var(--card);border-radius:12px;padding:18px;border:1px solid rgba(255,255,255,.06)}
.detail-quota-card .card-label{font-size:.8em;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.detail-quota-card .card-label .source-badge{font-size:.7em;color:var(--dim);font-weight:400}
.progress-row{margin-bottom:12px}
.progress-label{display:flex;justify-content:space-between;font-size:.76em;margin-bottom:4px;color:var(--dim)}
.progress-label strong{color:var(--text)}
.progress-track{height:7px;background:var(--bar-bg);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s ease}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.68em;font-weight:500;margin-right:3px}
.tag-text{background:rgba(52,152,219,.2);color:var(--blue)}
.tag-speech{background:rgba(155,89,182,.2);color:var(--purple)}
.tag-image{background:rgba(243,156,18,.2);color:var(--warn)}
.tag-music{background:rgba(52,152,219,.2);color:var(--blue)}
.tag-lyrics{background:rgba(230,126,34,.2);color:var(--orange)}
.model-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.76em}
.model-name{flex:1;color:var(--text)}
.model-bar-wrap{width:80px;height:5px;background:var(--bar-bg);border-radius:3px;overflow:hidden}
.model-bar-fill{height:100%;border-radius:3px}
.model-val{color:var(--dim);min-width:30px;text-align:right}
.quota-footer{font-size:.68em;color:var(--dim);margin-top:10px}

.section-title{font-size:.78em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.project-list{display:flex;flex-direction:column;gap:8px}
.project-card{background:var(--card);border-radius:10px;padding:14px 18px;cursor:pointer;transition:background .2s}
.project-card:hover{background:#1a2744}
.project-header{display:flex;align-items:center;gap:12px}
.project-card .icon{font-size:1.1rem;flex-shrink:0}
.project-card .name{flex:1;font-weight:600;font-size:.92em}
.project-card .meta{font-size:.72em;color:var(--dim);text-align:right}
.project-card .link{font-size:.72em;color:var(--blue);text-decoration:none;margin-left:8px}
.project-card .link:hover{text-decoration:underline}
.project-preview{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.82em;color:var(--dim);line-height:1.5}
.project-preview.open{max-height:300px;overflow-y:auto}
.project-preview-inner{padding:10px 0 4px 28px;border-top:1px solid rgba(255,255,255,.06);margin-top:10px}
.project-preview-inner p{margin-bottom:6px}
.project-preview-inner code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:.9em}
.expand-icon{font-size:.7em;color:var(--dim);transition:transform .2s;margin-left:4px}

@media(max-width:600px){
  .header{padding:12px 14px}
  .header h1{font-size:.95rem}
  .detail-quota-grid{grid-template-columns:1fr;gap:10px}
  .detail-quota-card{padding:14px}
}
</style>
</head>
<body>

<div class="header">
  <h1><img src="images/logo.png" alt="Logo" class="header-logo">虛擬辦公室</h1>
  <div class="header-right">
    <span class="update" id="lastUpdate">更新: —</span>
    <a href="memory/">🧠 Memory</a>
    <a href="dashboard.html">📊 Dashboard →</a>
  </div>
</div>

<div class="container">

  <div class="section-title" style="margin-bottom:14px">⚡ Agent 使用總覽</div>

  <div class="agent-grid" id="agentGrid">
    <article class="agent-card" id="agent-codex"></article>
    <article class="agent-card" id="agent-claude"></article>
    <article class="agent-card" id="agent-minimax"></article>
    <article class="agent-card" id="agent-copilot"></article>
  </div>

  <div class="section-title">📋 Projects</div>
  <div class="project-list" id="projectList"></div>

</div>

<script>
const projects = [
  { name:'MiniMax 工作坊', icon:'🛠️', status:'active', link:'https://ai-lish.github.io/minimax-workshop/', date:'2026-05-31', repo:'ai-lish/minimax-workshop', desc:'MiniMax API 全功能展示 — TTS、圖像生成、VLM、語音對話' },
  { name:'平方包', icon:'🎮', status:'active', link:'https://ai-lish.github.io/square-bun/', date:'2026-04-16', repo:'ai-lish/square-bun', desc:'數學乘除法心算訓練卡牌遊戲' },
  { name:'Song-of-Songs', icon:'🎵', status:'active', link:'https://ai-lish.github.io/Song-of-Songs/index.html', date:'2026-03-28', repo:'ai-lish/Song-of-Songs', desc:'歌詞影片製作專案 — Song of Songs 系列' },
  { name:'虛擬辦公室', icon:'🏢', status:'active', link:'https://ai-lish.github.io/virtual-office/', date:'2026-03-05', repo:'ai-lish/virtual-office', desc:'AI 助手工作狀態監控儀表板' },
  { name:'全方位學習日', icon:'✅', status:'completed', link:'https://ai-lish.github.io/lsc-ole-s1-2026/', date:'2026-03-26', repo:'ai-lish/lsc-ole-s1-2026', desc:'S1 全方位學習日活動網站' },
  { name:'晞霖學習網站', icon:'✅', status:'completed', link:'https://ai-lish.github.io/preschool/', date:'2026-03-08', repo:'ai-lish/preschool', desc:'幼兒教育互動學習平台' },
  { name:'少康教學網站', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/ai-learning/', date:'2026-03-01', repo:'ai-lish/ai-learning', desc:'HKDSE 數學教學資源網站' },
  { name:'數學週 2026', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/math-week-2026/', date:'2026-02-20', repo:'ai-lish/math-week-2026', desc:'2026 數學週活動網站' },
  { name:'欠交功課系統', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/homework-duty-system/', date:'2026-03-07', repo:'ai-lish/homework-duty-system', desc:'學生功課追蹤管理系統' },
  { name:'教師發展日', icon:'✅', status:'completed', link:'https://ai-lish.github.io/teacher-dev-day/', date:'2026-01-15', repo:'ai-lish/teacher-dev-day', desc:'教師專業發展日活動' }
];

const listEl = document.getElementById('projectList');
const statusIcon = { active:'🔄', completed:'✅', pending:'⏳' };
const statusLabel = { active:'進行中', completed:'已完成', pending:'待開始' };
projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.innerHTML = `
    <div class="project-header" onclick="togglePreview(${i})">
      <span class="icon">${statusIcon[p.status] || p.icon}</span>
      <span class="name">${p.name} <span class="expand-icon" id="expand-${i}">▶</span></span>
      <span class="meta">${p.date}</span>
      <a class="link" href="public/pages/project.html?repo=${encodeURIComponent(p.repo)}&name=${encodeURIComponent(p.name)}&desc=${encodeURIComponent(p.desc)}&status=${p.status}&date=${p.date}&link=${encodeURIComponent(p.link)}" onclick="event.stopPropagation()">詳情 →</a>
      <a class="link" href="${p.link}" target="_blank" onclick="event.stopPropagation()">開啟 →</a>
    </div>
    <div class="project-preview" id="preview-${i}">
      <div class="project-preview-inner">
        <p><strong>狀態:</strong> ${statusLabel[p.status] || p.status}</p>
        <p>${p.desc}</p>
        <p id="readme-${i}" style="color:var(--dim);font-size:.9em;">載入 README…</p>
      </div>
    </div>
  `;
  listEl.appendChild(card);
});

function togglePreview(i) {
  const el = document.getElementById('preview-' + i);
  const icon = document.getElementById('expand-' + i);
  const isOpen = el.classList.toggle('open');
  icon.textContent = isOpen ? '▼' : '▶';
  if (isOpen && !el.dataset.loaded) {
    el.dataset.loaded = '1';
    loadReadme(i);
  }
}

const readmeCache = {};
async function loadReadme(i) {
  const p = projects[i];
  if (!p.repo) return;
  const el = document.getElementById('readme-' + i);
  try {
    if (readmeCache[p.repo]) { el.innerHTML = readmeCache[p.repo]; return; }
    const res = await fetch(`https://api.github.com/repos/${p.repo}/readme`, { headers: { Accept: 'application/vnd.github.v3.raw' } });
    if (!res.ok) { el.textContent = '無法載入 README'; return; }
    const text = await res.text();
    let snippet = text.slice(0, 600)
      .replace(/^#+\s*/gm, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/!\[.*?\]\(.*?\)/g, '')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
    if (text.length > 600) snippet += '…';
    const html = snippet.split('\n').map(l => `<p>${l || '&nbsp;'}</p>`).join('');
    readmeCache[p.repo] = html;
    el.innerHTML = html;
  } catch(e) { el.textContent = '載入失敗'; }
}

// ── Agent usage grid loader (compact 4-card at-a-glance) ──
const pctColor = pct => pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warn)' : 'var(--green)';
const clampPct = n => Math.max(0, Math.min(100, Math.round(Number(n) || 0)));
const basePath = () => location.pathname.includes('/virtual-office') ? '/virtual-office' : '';

function metric(label, pct) {
  const v = clampPct(pct);
  return `<div class="agent-metric">
    <div class="agent-row"><span>${label}</span><strong>${v}%</strong></div>
    <div class="agent-track"><div class="agent-fill" style="width:${v}%;background:${pctColor(v)}"></div></div>
  </div>`;
}

function setAgent(id, {title, badge='—', body='', footer='', muted=false, error=false, stale=false}) {
  const el = document.getElementById('agent-' + id);
  if (!el) return;
  let cls = 'agent-card';
  if (muted) cls += ' is-muted';
  if (error) cls += ' is-error';
  if (stale) cls += ' is-stale';
  el.className = cls;
  el.innerHTML = `<div class="agent-head">
    <div class="agent-title">${title}</div><span class="agent-badge">${badge}</span>
  </div>${body}<div class="agent-footer">${footer}</div>`;
}

function fmtReset(v) {
  if (!v) return '—';
  if (typeof v === 'string' && /^\d\d-\d\d /.test(v)) return v;
  const d = new Date(v);
  return Number.isNaN(d.getTime()) ? '—' : d.toLocaleString('zh-HK',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

async function fetchJson(path, ts) {
  const res = await fetch(`${basePath()}${path}?${ts}`);
  if (!res.ok) throw new Error(`${path} ${res.status}`);
  return res.json();
}

async function loadAgentUsage() {
  const ts = Date.now();
  let lastUpdate = null;

  const [usage, minimax, copilot] = await Promise.allSettled([
    fetchJson('/public/usage-quota.json', ts),
    fetchJson('/public/minimax-api-status.json', ts),
    fetchJson('/public/copilot-summary.json', ts)
  ]);

  // ── Codex + Claude ──
  if (usage.status === 'fulfilled') {
    const q = usage.value;
    if (q._generatedAt) lastUpdate = new Date(q._generatedAt);

    const c = q.codex || {};
    setAgent('codex', {
      title: c.available === false ? '⚫ Codex' : (c.limit_reached ? '🔴 Codex' : '🟢 Codex'),
      badge: c.plan || 'plus',
      body: metric('5h', c.primary_5h?.used_percent) + metric('7d', c.secondary_7d?.used_percent),
      footer: `<span>Reset ${fmtReset(c.primary_5h?.reset_at_hkt)}</span><a href="dashboard.html">詳情 →</a>`
    });

    const cl = q.claude || {};
    if (cl.available) {
      setAgent('claude', {
        title: cl.limit_reached ? '🔴 Claude Code' : '🟢 Claude Code',
        badge: cl.subscription && cl.subscription !== 'unknown' ? cl.subscription : 'active',
        body: metric('5h', cl.primary_5h?.used_percent) + metric('7d', cl.secondary_7d?.used_percent),
        footer: `<span>Reset ${fmtReset(cl.primary_5h?.reset_at_hkt)}</span><a href="dashboard.html">詳情 →</a>`
      });
    } else {
      setAgent('claude', {
        title: '⚫ Claude Code',
        badge: 'N/A',
        body: '<div class="agent-row"><span>5h</span><strong>—</strong></div><div class="agent-row"><span>7d</span><strong>—</strong></div>',
        footer: '<span>未連接 usage source</span><a href="dashboard.html">詳情 →</a>',
        muted: true
      });
    }
  } else {
    setAgent('codex', {title:'⚫ Codex', badge:'Error', body:'資料暫時不可用', footer:'<a href="dashboard.html">詳情 →</a>', error:true});
    setAgent('claude', {title:'⚫ Claude Code', badge:'Error', body:'資料暫時不可用', footer:'<a href="dashboard.html">詳情 →</a>', error:true});
    console.log('usage-quota fetch error', usage.reason);
  }

  // ── MiniMax ──
  if (minimax.status === 'fulfilled') {
    const d = minimax.value;
    const general = (d.allModels || []).find(m => m.model === 'general');
    const used5h = 100 - (general?.remainingPct ?? 100);
    const usedWk = 100 - (general?.weeklyRemainingPct ?? 100);
    const resetRaw = general?.resetTime || (d.raw?.model_remains?.[0]?.end_time);
    setAgent('minimax', {
      title: '🟢 MiniMax',
      badge: d._source === 'github-actions-live-api' ? '即時' : '快取',
      body: metric('5h general', used5h) + metric('wk general', usedWk),
      footer: `<span>Reset ${fmtReset(resetRaw)}</span><a href="dashboard.html#tab-minimax">詳情 →</a>`
    });
    if (d._generatedAt) {
      const t = new Date(d._generatedAt);
      if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }
  } else {
    setAgent('minimax', {title:'🟢 MiniMax', badge:'Error', body:'資料暫時不可用', footer:'<a href="dashboard.html#tab-minimax">詳情 →</a>', error:true});
    console.log('minimax-api-status fetch error', minimax.reason);
  }

  // ── Copilot ──
  if (copilot.status === 'fulfilled') {
    const d = copilot.value;
    const now = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const monthData = d.analysis?.byMonth?.[month];
    const nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString().slice(0,10);

    if (!monthData || monthData.total == null) {
      setAgent('copilot', {title:'🟡 Copilot', badge:'無本月資料', body:'<div class="agent-row"><span>monthly</span><strong>—</strong></div>', footer:`<span>Reset ${nextReset}</span><a href="dashboard.html#tab-copilot">詳情 →</a>`, muted:true});
    } else {
      const used = monthData.total || 0;
      const total = 300;
      const pct = clampPct(used / total * 100);
      setAgent('copilot', {
        title: pct >= 80 ? '🔴 Copilot' : (pct >= 50 ? '🟡 Copilot' : '🟢 Copilot'),
        badge: 'Premium',
        body: metric(`${used}/${total}`, pct),
        footer: `<span>Reset ${nextReset}</span><a href="dashboard.html#tab-copilot">詳情 →</a>`
      });
    }
    if (d._generatedAt) {
      const t = new Date(d._generatedAt);
      if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }
  } else {
    setAgent('copilot', {title:'🟡 Copilot', badge:'Error', body:'資料暫時不可用', footer:'<a href="dashboard.html#tab-copilot">詳情 →</a>', error:true});
    console.log('copilot-summary fetch error', copilot.reason);
  }

  if (lastUpdate) {
    document.getElementById('lastUpdate').textContent = '更新: ' + lastUpdate.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
  }
}

loadAgentUsage();
setInterval(loadAgentUsage, 300000);
</script>
</body>
</html>
