<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 虛擬辦公室</title>
    <link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#16213e;--bar-bg:#0a1628;--text:#eee;--dim:#888;--red:#bc002d;--green:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--blue:#3498db;--purple:#9b59b6;--orange:#e67e22}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,#1a1a2e,#16213e);border-bottom:2px solid var(--red);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
.header-logo{width:32px;height:32px;border-radius:6px;vertical-align:middle}
.header-right{display:flex;align-items:center;gap:14px}
.header-right .update{font-size:.72em;color:var(--dim)}
.header-right a{color:#fff;text-decoration:none;font-size:.9em;padding:5px 14px;border:1px solid rgba(255,255,255,.25);border-radius:18px;transition:all .2s;font-weight:600}
.header-right a:hover{color:#fff;border-color:var(--red)}

.container{max-width:1280px;margin:0 auto;padding:24px 16px 60px}

.section-title{font-size:.78em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:10px}

/* ── Detail agent grid (per PLANNING/20260627_REDESIGN_V1.md §3.1) ── */
.detail-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:32px}
.detail-card{background:var(--card);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:18px;min-width:0;transition:border-color .2s}
.detail-card.is-muted{opacity:.65}
.detail-card.is-error{border-color:rgba(231,76,60,.45)}
.detail-card.is-stale{border-color:rgba(243,156,18,.45)}
.detail-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.06)}
.detail-title{font-size:.95rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px}
.detail-title .dot{font-size:1.1em;line-height:1}
.detail-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.detail-badge{font-size:.62em;color:var(--text);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:2px 8px;white-space:nowrap;font-weight:600}
.detail-badge.b-plan{background:rgba(52,152,219,.18);color:var(--blue);border-color:rgba(52,152,219,.35)}
.detail-badge.b-sub{background:rgba(155,89,182,.18);color:var(--purple);border-color:rgba(155,89,182,.35)}
.detail-badge.b-status-ok{background:rgba(46,204,113,.18);color:var(--green);border-color:rgba(46,204,113,.35)}
.detail-badge.b-status-bad{background:rgba(231,76,60,.18);color:var(--danger);border-color:rgba(231,76,60,.35)}
.detail-badge.b-source{background:rgba(243,156,18,.18);color:var(--warn);border-color:rgba(243,156,18,.35)}

.detail-progress{margin-bottom:12px}
.detail-progress:last-of-type{margin-bottom:6px}
.detail-row{display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:.74em;margin-bottom:5px}
.detail-row .label{color:var(--dim)}
.detail-row .val{color:var(--text);font-variant-numeric:tabular-nums;font-weight:600}
.detail-row .val .pct{font-size:1.05em}
.detail-row .val .remain{color:var(--dim);font-weight:400;margin-left:5px;font-size:.92em}
.detail-row .reset{color:var(--dim);font-size:.9em;font-weight:400}
.detail-track{height:7px;background:var(--bar-bg);border-radius:4px;overflow:hidden}
.detail-fill{height:100%;border-radius:4px;transition:width .6s ease,background .3s}

.detail-divider{height:1px;background:rgba(255,255,255,.06);margin:10px 0 8px}
.detail-sublabel{font-size:.66em;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 6px;font-weight:600}
.detail-model-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.76em}
.detail-model-name{flex:1;color:var(--text)}
.detail-model-bar-wrap{flex:0 0 80px;height:5px;background:var(--bar-bg);border-radius:3px;overflow:hidden}
.detail-model-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.detail-model-val{color:var(--dim);min-width:46px;text-align:right;font-variant-numeric:tabular-nums}

.detail-footer{margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);font-size:.66em;color:var(--dim);display:flex;flex-direction:column;gap:4px}
.detail-footer .footer-row{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
.detail-footer .footer-row strong{color:var(--text);font-weight:600}
.detail-footer .tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:.95em;font-weight:500;margin-right:3px}
.detail-footer .tag.session{background:rgba(155,89,182,.18);color:var(--purple)}
.detail-footer .tag.weekly{background:rgba(52,152,219,.18);color:var(--blue)}
.detail-footer .tag.opus{background:rgba(231,76,60,.18);color:var(--danger)}
.detail-footer .tag.sonnet{background:rgba(52,152,219,.18);color:var(--blue)}
.detail-footer .tag.other{background:rgba(243,156,18,.18);color:var(--warn)}
.detail-footer a{color:var(--blue);text-decoration:none}
.detail-footer a:hover{text-decoration:underline}

@media(max-width:1279px){.detail-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:600px){
  .header{padding:12px 14px}
  .header h1{font-size:.95rem}
  .detail-grid{grid-template-columns:1fr;gap:12px}
  .detail-card{padding:14px}
}

/* ── Projects ── */
.project-list{display:flex;flex-direction:column;gap:8px}
.project-card{background:var(--card);border-radius:10px;padding:14px 18px;cursor:pointer;transition:background .2s}
.project-card:hover{background:#1a2744}
.project-header{display:flex;align-items:center;gap:12px}
.project-card .icon{font-size:1.1rem;flex-shrink:0}
.project-card .name{flex:1;font-weight:600;font-size:.92em}
.project-card .meta{font-size:.72em;color:var(--dim);text-align:right}
.project-card .link{font-size:.72em;color:var(--blue);text-decoration:none;margin-left:8px}
.project-card .link:hover{text-decoration:underline}
.project-preview{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.82em;color:var(--dim);line-height:1.5}
.project-preview.open{max-height:300px;overflow-y:auto}
.project-preview-inner{padding:10px 0 4px 28px;border-top:1px solid rgba(255,255,255,.06);margin-top:10px}
.project-preview-inner p{margin-bottom:6px}
.project-preview-inner code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:.9em}
.expand-icon{font-size:.7em;color:var(--dim);transition:transform .2s;margin-left:4px}
</style>
</head>
<body>

<div class="header">
  <h1><img src="images/logo.png" alt="Logo" class="header-logo">虛擬辦公室</h1>
  <div class="header-right">
    <span class="update" id="lastUpdate">更新: —</span>
    <a href="memory/">🧠 Memory</a>
    <a href="dashboard.html">📊 Dashboard →</a>
  </div>
</div>

<div class="container">

  <div class="section-title" style="margin-bottom:14px">⚡ Agent 使用總覽</div>

  <div class="detail-grid" id="detailGrid">
    <div class="detail-card" id="detail-codex"></div>
    <div class="detail-card" id="detail-claude"></div>
    <div class="detail-card" id="detail-minimax"></div>
    <div class="detail-card" id="detail-copilot"></div>
  </div>

  <div class="section-title">📋 Projects</div>
  <div class="project-list" id="projectList"></div>

</div>

<script>
const projects = [
  { name:'MiniMax 工作坊', icon:'🛠️', status:'active', link:'https://ai-lish.github.io/minimax-workshop/', date:'2026-05-31', repo:'ai-lish/minimax-workshop', desc:'MiniMax API 全功能展示 — TTS、圖像生成、VLM、語音對話' },
  { name:'平方包', icon:'🎮', status:'active', link:'https://ai-lish.github.io/square-bun/', date:'2026-04-16', repo:'ai-lish/square-bun', desc:'數學乘除法心算訓練卡牌遊戲' },
  { name:'Song-of-Songs', icon:'🎵', status:'active', link:'https://ai-lish.github.io/Song-of-Songs/index.html', date:'2026-03-28', repo:'ai-lish/Song-of-Songs', desc:'歌詞影片製作專案 — Song of Songs 系列' },
  { name:'虛擬辦公室', icon:'🏢', status:'active', link:'https://ai-lish.github.io/virtual-office/', date:'2026-03-05', repo:'ai-lish/virtual-office', desc:'AI 助手工作狀態監控儀表板' },
  { name:'全方位學習日', icon:'✅', status:'completed', link:'https://ai-lish.github.io/lsc-ole-s1-2026/', date:'2026-03-26', repo:'ai-lish/lsc-ole-s1-2026', desc:'S1 全方位學習日活動網站' },
  { name:'晞霖學習網站', icon:'✅', status:'completed', link:'https://ai-lish.github.io/preschool/', date:'2026-03-08', repo:'ai-lish/preschool', desc:'幼兒教育互動學習平台' },
  { name:'少康教學網站', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/ai-learning/', date:'2026-03-01', repo:'ai-lish/ai-learning', desc:'HKDSE 數學教學資源網站' },
  { name:'數學週 2026', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/math-week-2026/', date:'2026-02-20', repo:'ai-lish/math-week-2026', desc:'2026 數學週活動網站' },
  { name:'欠交功課系統', icon:'⏳', status:'pending', link:'https://ai-lish.github.io/homework-duty-system/', date:'2026-03-07', repo:'ai-lish/homework-duty-system', desc:'學生功課追蹤管理系統' },
  { name:'教師發展日', icon:'✅', status:'completed', link:'https://ai-lish.github.io/teacher-dev-day/', date:'2026-01-15', repo:'ai-lish/teacher-dev-day', desc:'教師專業發展日活動' }
];

const listEl = document.getElementById('projectList');
const statusIcon = { active:'🔄', completed:'✅', pending:'⏳' };
const statusLabel = { active:'進行中', completed:'已完成', pending:'待開始' };
projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.innerHTML = `
    <div class="project-header" onclick="togglePreview(${i})">
      <span class="icon">${statusIcon[p.status] || p.icon}</span>
      <span class="name">${p.name} <span class="expand-icon" id="expand-${i}">▶</span></span>
      <span class="meta">${p.date}</span>
      <a class="link" href="public/pages/project.html?repo=${encodeURIComponent(p.repo)}&name=${encodeURIComponent(p.name)}&desc=${encodeURIComponent(p.desc)}&status=${p.status}&date=${p.date}&link=${encodeURIComponent(p.link)}" onclick="event.stopPropagation()">詳情 →</a>
      <a class="link" href="${p.link}" target="_blank" onclick="event.stopPropagation()">開啟 →</a>
    </div>
    <div class="project-preview" id="preview-${i}">
      <div class="project-preview-inner">
        <p><strong>狀態:</strong> ${statusLabel[p.status] || p.status}</p>
        <p>${p.desc}</p>
        <p id="readme-${i}" style="color:var(--dim);font-size:.9em;">載入 README…</p>
      </div>
    </div>
  `;
  listEl.appendChild(card);
});

function togglePreview(i) {
  const el = document.getElementById('preview-' + i);
  const icon = document.getElementById('expand-' + i);
  const isOpen = el.classList.toggle('open');
  icon.textContent = isOpen ? '▼' : '▶';
  if (isOpen && !el.dataset.loaded) {
    el.dataset.loaded = '1';
    loadReadme(i);
  }
}

const readmeCache = {};
async function loadReadme(i) {
  const p = projects[i];
  if (!p.repo) return;
  const el = document.getElementById('readme-' + i);
  try {
    if (readmeCache[p.repo]) { el.innerHTML = readmeCache[p.repo]; return; }
    const res = await fetch(`https://api.github.com/repos/${p.repo}/readme`, { headers: { Accept: 'application/vnd.github.v3.raw' } });
    if (!res.ok) { el.textContent = '無法載入 README'; return; }
    const text = await res.text();
    let snippet = text.slice(0, 600)
      .replace(/^#+\s*/gm, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/!\[.*?\]\(.*?\)/g, '')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
    if (text.length > 600) snippet += '…';
    const html = snippet.split('\n').map(l => `<p>${l || '&nbsp;'}</p>`).join('');
    readmeCache[p.repo] = html;
    el.innerHTML = html;
  } catch(e) { el.textContent = '載入失敗'; }
}

// ── Detail agent loader (per PLANNING/20260627_REDESIGN_V1.md §3.1) ──
const pctColor = pct => pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warn)' : pct >= 50 ? 'var(--orange)' : 'var(--green)';
const clampPct = n => Math.max(0, Math.min(100, Math.round(Number(n) || 0)));
const basePath = () => location.pathname.includes('/virtual-office') ? '/virtual-office' : '';

function statusDot(available, limitReached) {
  if (available === false) return { dot: '⚫', label: '不可用', cls: 'b-status-bad' };
  if (limitReached) return { dot: '🔴', label: '已達上限', cls: 'b-status-bad' };
  return { dot: '🟢', label: '可用', cls: 'b-status-ok' };
}

function progressRow(label, usedPct, resetText) {
  const v = clampPct(usedPct);
  return `<div class="detail-progress">
    <div class="detail-row"><span class="label">${label}</span><span class="val"><span class="pct">${v}%</span><span class="remain">(${100 - v}% 剩餘)</span>${resetText ? `<span class="reset"> · Reset ${resetText}</span>` : ''}</span></div>
    <div class="detail-track"><div class="detail-fill" style="width:${v}%;background:${pctColor(v)};"></div></div>
  </div>`;
}

function modelRow(name, usedPct, valText) {
  const v = clampPct(usedPct);
  return `<div class="detail-model-row">
    <span class="detail-model-name">${name}</span>
    <span class="detail-model-bar-wrap"><span class="detail-model-bar-fill" style="display:block;width:${v}%;background:${pctColor(v)};"></span></span>
    <span class="detail-model-val">${v}%${valText ? ' ' + valText : ''}</span>
  </div>`;
}

function setDetail(id, {dot, title, badges=[], body='', footer='', muted=false, error=false}) {
  const el = document.getElementById('detail-' + id);
  if (!el) return;
  let cls = 'detail-card';
  if (muted) cls += ' is-muted';
  if (error) cls += ' is-error';
  el.className = cls;
  const badgesHtml = badges.map(b => `<span class="detail-badge ${b.cls || ''}">${b.text}</span>`).join('');
  el.innerHTML = `<div class="detail-head">
    <div class="detail-title"><span class="dot">${dot}</span>${title}</div>
    <div class="detail-badges">${badgesHtml}</div>
  </div>${body}<div class="detail-footer">${footer}</div>`;
}

function fmtReset(v) {
  if (!v) return '';
  if (typeof v === 'string' && /^\d\d-\d\d /.test(v)) return v;
  const d = new Date(v);
  return Number.isNaN(d.getTime()) ? '' : d.toLocaleString('zh-HK',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

function fmtResetMs(ms) {
  if (!ms) return '';
  const d = new Date(Number(ms));
  return Number.isNaN(d.getTime()) ? '' : d.toLocaleString('zh-HK',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

async function fetchJson(path, ts) {
  const res = await fetch(`${basePath()}${path}?${ts}`);
  if (!res.ok) throw new Error(`${path} ${res.status}`);
  return res.json();
}

async function loadDetailUsage() {
  const ts = Date.now();
  let lastUpdate = null;

  const [usage, minimax, copilot] = await Promise.allSettled([
    fetchJson('/public/usage-quota.json', ts),
    fetchJson('/public/minimax-api-status.json', ts),
    fetchJson('/public/copilot-summary.json', ts)
  ]);

  // ── Codex + Claude ──
  if (usage.status === 'fulfilled') {
    const q = usage.value;
    if (q._generatedAt) lastUpdate = new Date(q._generatedAt);

    const c = q.codex || {};
    const cs = statusDot(c.available !== false, c.limit_reached);
    setDetail('codex', {
      dot: cs.dot,
      title: 'Codex',
      badges: [
        { text: c.plan || 'plus', cls: 'b-plan' },
        { text: cs.label, cls: cs.cls },
        ...(c.limit_reached ? [{ text: 'Limit Reached', cls: 'b-status-bad' }] : [])
      ],
      body:
        progressRow('5h Primary', c.primary_5h?.used_percent, fmtReset(c.primary_5h?.reset_at_hkt)) +
        progressRow('7d Secondary', c.secondary_7d?.used_percent, fmtReset(c.secondary_7d?.reset_at_hkt)),
      footer:
        `<div class="footer-row"><span>Plan</span><strong>${c.plan || '—'}</strong></div>` +
        `<div class="footer-row"><span>5h Reset</span><strong>${fmtReset(c.primary_5h?.reset_at_hkt) || '—'}</strong></div>` +
        `<div class="footer-row"><span>7d Reset</span><strong>${fmtReset(c.secondary_7d?.reset_at_hkt) || '—'}</strong></div>` +
        `<div class="footer-row"><span>來源</span><strong>usage-quota.json</strong></div>`
    });

    const cl = q.claude || {};
    const cls = statusDot(cl.available !== false, cl.limit_reached);
    const subRaw = cl.subscription || '';
    const subHasReal = subRaw && subRaw !== 'n/a' && subRaw !== 'unknown';
    const subText = subHasReal ? subRaw : 'OAuth-based';
    const subCls = subHasReal ? 'b-sub' : 'b-source';
    const limits = cl.active_limits || [];
    const limitsHtml = limits.length
      ? limits.map(l => `<span class="tag session">${l.kind || 'session'} ${l.percent || 0}%</span>`).join('')
      : '<span style="color:var(--dim)">—</span>';
    setDetail('claude', {
      dot: cls.dot,
      title: 'Claude Code',
      badges: [
        { text: subText, cls: subCls },
        { text: cls.label, cls: cls.cls },
        ...(cl._error ? [{ text: 'OAuth 錯誤', cls: 'b-status-bad' }] : [])
      ],
      body:
        progressRow('5h Primary', cl.primary_5h?.used_percent, fmtReset(cl.primary_5h?.reset_at_hkt)) +
        progressRow('7d Secondary', cl.secondary_7d?.used_percent, fmtReset(cl.secondary_7d?.reset_at_hkt)),
      footer:
        `<div class="footer-row"><span>Subscription</span><strong title="Claude OAuth usage API does not expose plan type" style="cursor:help;">${subHasReal ? subRaw : 'n/a (OAuth API)'}</strong></div>` +
        `<div class="footer-row"><span>5h Reset</span><strong>${fmtReset(cl.primary_5h?.reset_at_hkt) || '—'}</strong></div>` +
        `<div class="footer-row"><span>7d Reset</span><strong>${fmtReset(cl.secondary_7d?.reset_at_hkt) || '—'}</strong></div>` +
        `<div class="footer-row"><span>Active Limits</span><strong>${limitsHtml}</strong></div>` +
        `<div class="footer-row"><span>來源</span><strong>usage-quota.json</strong></div>`
    });
  } else {
    setDetail('codex', {dot:'⚫', title:'Codex', badges:[{text:'Error', cls:'b-status-bad'}], body: progressRow('5h Primary', 0, '') + progressRow('7d Secondary', 0, ''), footer:'<div class="footer-row"><span>狀態</span><strong>資料暫時不可用</strong></div>', error:true});
    setDetail('claude', {dot:'⚫', title:'Claude Code', badges:[{text:'Error', cls:'b-status-bad'}], body: progressRow('5h Primary', 0, '') + progressRow('7d Secondary', 0, ''), footer:'<div class="footer-row"><span>狀態</span><strong>資料暫時不可用</strong></div>', error:true});
    console.log('usage-quota fetch error', usage.reason);
  }

  // ── MiniMax ──
  if (minimax.status === 'fulfilled') {
    const d = minimax.value;
    const models = d.allModels || [];
    const general = models.find(m => m.model === 'general');
    const video = models.find(m => m.model === 'video');
    const used5h = 100 - (general?.remainingPct ?? 100);
    const usedWk = 100 - (general?.weeklyRemainingPct ?? 100);
    const videoDaily = 100 - (video?.remainingPct ?? 100);
    const videoWk = 100 - (video?.weeklyRemainingPct ?? 100);
    const resetRaw = general?.resetTime || (d.raw?.model_remains?.[0]?.end_time);
    const sourceBadge = d._source === 'github-actions-live-api' ? '即時' : '快取';

    const modelRows = [];
    if (general) {
      modelRows.push(`<div class="detail-sublabel">General model</div>`);
      modelRows.push(modelRow('5h window', general.remainingPct != null ? 100 - general.remainingPct : 0, fmtResetMs(general.resetTime)));
      modelRows.push(modelRow('週 window', general.weeklyRemainingPct != null ? 100 - general.weeklyRemainingPct : 0));
    }
    if (video) {
      modelRows.push(`<div class="detail-sublabel">Video model</div>`);
      modelRows.push(modelRow('Daily', video.remainingPct != null ? 100 - video.remainingPct : 0));
      modelRows.push(modelRow('週 window', video.weeklyRemainingPct != null ? 100 - video.weeklyRemainingPct : 0));
    }

    setDetail('minimax', {
      dot: '🟢',
      title: 'MiniMax',
      badges: [
        { text: sourceBadge, cls: 'b-source' },
        { text: '可用', cls: 'b-status-ok' }
      ],
      body: modelRows.length ? modelRows.join('') : '<div style="color:var(--dim);font-size:.78em;">無 model 資料</div>',
      footer:
        `<div class="footer-row"><span>General 5h</span><strong>${clampPct(used5h)}%</strong></div>` +
        `<div class="footer-row"><span>General 週</span><strong>${clampPct(usedWk)}%</strong></div>` +
        (video ? `<div class="footer-row"><span>Video Daily</span><strong>${clampPct(videoDaily)}%</strong></div>` : '') +
        (video ? `<div class="footer-row"><span>Video 週</span><strong>${clampPct(videoWk)}%</strong></div>` : '') +
        `<div class="footer-row"><span>Reset</span><strong>${fmtReset(resetRaw) || '—'}</strong></div>` +
        `<div class="footer-row"><span>來源</span><strong>minimax-api-status.json</strong></div>`
    });
    if (d._generatedAt) {
      const t = new Date(d._generatedAt);
      if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }
  } else {
    setDetail('minimax', {dot:'⚫', title:'MiniMax', badges:[{text:'Error', cls:'b-status-bad'}], body:'<div style="color:var(--dim);font-size:.78em;">資料暫時不可用</div>', footer:'<div class="footer-row"><span>狀態</span><strong>資料暫時不可用</strong></div>', error:true});
    console.log('minimax-api-status fetch error', minimax.reason);
  }

  // ── Copilot ──
  if (copilot.status === 'fulfilled') {
    const d = copilot.value;
    const now = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const byMonth = d.analysis?.byMonth || {};
    let monthData = byMonth[month];
    let usedMonth = month;
    // Fallback: if current month has no data, use most recent available month.
    if (!monthData || monthData.total == null) {
      const months = Object.keys(byMonth).sort();
      if (months.length) {
        usedMonth = months[months.length - 1];
        monthData = byMonth[usedMonth];
      }
    }
    const nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString().slice(0,10);

    if (!monthData || monthData.total == null) {
      setDetail('copilot', {dot:'🟡', title:'Copilot', badges:[{text:'Premium', cls:'b-plan'},{text:'無資料', cls:'b-source'}], body:'<div style="color:var(--dim);font-size:.78em;">尚無使用記錄</div>', footer:`<div class="footer-row"><span>Plan</span><strong>Premium</strong></div><div class="footer-row"><span>Reset</span><strong>${nextReset}</strong></div>`, muted:true});
    } else {
      const used = monthData.total || 0;
      const total = 300;
      const pct = clampPct(used / total * 100);
      const byModel = monthData.byModel || {};
      // Try to bucket known model names — labels are arbitrary since real CSVs
      // show names like "Claude Opus 4.6" / "GPT-5.4 mini" etc.
      // Bucket models by family. Real CSV names change frequently; we only highlight the
      // two Anthropic families (Opus / Sonnet) and collapse the rest into "其他".
      const bucket = (rx) => Object.entries(byModel).reduce((s, [name, v]) =>
        s + (rx.test(name) ? Number(v.requests || v) : 0), 0);
      const opusCount = bucket(/claude.*opus/i);
      const sonnetCount = bucket(/claude.*sonnet/i);
      const otherCount = Math.max(0, used - opusCount - sonnetCount);
      const isFallback = usedMonth !== month;
      const monthLabel = isFallback ? `${usedMonth} (最新可用)` : month;

      setDetail('copilot', {
        dot: pct >= 80 ? '🔴' : pct >= 50 ? '🟡' : '🟢',
        title: 'Copilot',
        badges: [
          { text: 'Premium', cls: 'b-plan' },
          { text: pct + '%', cls: pct >= 80 ? 'b-status-bad' : pct >= 50 ? 'b-source' : 'b-status-ok' }
        ],
        body:
          progressRow(`本月用量 (${used}/${total}) — ${monthLabel}`, pct, nextReset) +
          `<div class="detail-sublabel">模型分項 (${usedMonth})</div>` +
          (opusCount ? modelRow('Opus', opusCount / Math.max(used, 1) * 100, opusCount + ' req') : '') +
          (sonnetCount ? modelRow('Sonnet', sonnetCount / Math.max(used, 1) * 100, sonnetCount + ' req') : '') +
          (otherCount > 0 ? modelRow('其他', otherCount / Math.max(used, 1) * 100, otherCount + ' req') : '') +
          (!opusCount && !sonnetCount && otherCount === 0 ? '<div style="color:var(--dim);font-size:.74em;">無分項資料</div>' : ''),
        footer:
          `<div class="footer-row"><span>月份</span><strong>${monthLabel}</strong></div>` +
          `<div class="footer-row"><span>本月用量</span><strong>${used} / ${total}</strong></div>` +
          `<div class="footer-row"><span>使用率</span><strong>${pct}%</strong></div>` +
          `<div class="footer-row"><span>Reset</span><strong>${nextReset}</strong></div>` +
          `<div class="footer-row"><span>來源</span><strong>copilot-summary.json</strong></div>`
      });
    }
    if (d._generatedAt) {
      const t = new Date(d._generatedAt);
      if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }
  } else {
    setDetail('copilot', {dot:'🟡', title:'Copilot', badges:[{text:'Error', cls:'b-status-bad'}], body:'<div style="color:var(--dim);font-size:.78em;">資料暫時不可用</div>', footer:'<div class="footer-row"><span>狀態</span><strong>資料暫時不可用</strong></div>', error:true});
    console.log('copilot-summary fetch error', copilot.reason);
  }

  if (lastUpdate) {
    document.getElementById('lastUpdate').textContent = '更新: ' + lastUpdate.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
  }
}

loadDetailUsage();
setInterval(loadDetailUsage, 300000);
</script>
</body>
</html>
