<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏢 虛擬辦公室</title>
    <link rel="icon" href="images/logo.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f23;--card:#16213e;--bar-bg:#0a1628;--text:#eee;--dim:#888;--red:#bc002d;--green:#2ecc71;--warn:#f39c12;--danger:#e74c3c;--blue:#3498db;--purple:#9b59b6;--orange:#e67e22}
body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.header{position:sticky;top:0;z-index:10;background:linear-gradient(90deg,#1a1a2e,#16213e);border-bottom:2px solid var(--red);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.1rem;display:flex;align-items:center;gap:8px}
.header-logo{width:32px;height:32px;border-radius:6px;vertical-align:middle}
.header-right{display:flex;align-items:center;gap:14px}
.header-right .update{font-size:.72em;color:var(--dim)}
.header-right a{color:#fff;text-decoration:none;font-size:.9em;padding:5px 14px;border:1px solid rgba(255,255,255,.25);border-radius:18px;transition:all .2s;font-weight:600}
.header-right a:hover{color:#fff;border-color:var(--red)}

.container{max-width:1280px;margin:0 auto;padding:24px 16px 60px}

.section-title{font-size:.78em;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:10px}

/* ── Single quota card (per Planning/20260628_HOMEPAGE_DASHBOARD_REDESIGN_V2.md §3.1) ── */
.quota-card{background:var(--card);border-radius:14px;padding:24px;border:1px solid rgba(255,255,255,.07);margin-bottom:32px}
.quota-card-header{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.08)}
.quota-card-title{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px}
.quota-card-updated{font-size:.7em;color:var(--dim);font-variant-numeric:tabular-nums}

.quota-table{width:100%;border-collapse:collapse;font-size:.86em}
.quota-table th,.quota-table td{padding:10px 12px;text-align:left;border-bottom:1px solid rgba(255,255,255,.05)}
.quota-table th{font-size:.7em;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.quota-table tbody tr:last-child td{border-bottom:none}
.quota-table tbody tr:hover{background:rgba(255,255,255,.02)}
.quota-table .col-agent{font-weight:600;white-space:nowrap}
.quota-table .col-num{font-variant-numeric:tabular-nums;text-align:right;min-width:64px}
.quota-table .col-reset{color:var(--dim);font-size:.92em;white-space:nowrap}
.quota-table .col-reset em{color:var(--text);font-style:normal;font-weight:500}
.quota-table .muted{color:var(--dim)}

.pct-bar-wrap{position:relative;width:64px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-left:auto}
.pct-bar-fill{height:100%;border-radius:3px;transition:width .5s ease}
.pct-bar-color-low{background:var(--green)}
.pct-bar-color-mid{background:var(--orange)}
.pct-bar-color-high{background:var(--warn)}
.pct-bar-color-crit{background:var(--danger)}
.pct-bar-color-bad{background:var(--danger)}

.pct-cell{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.pct-cell .v{font-variant-numeric:tabular-nums;font-weight:600}

.plan-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.72em;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.plan-badge.plan-plus{background:rgba(52,152,219,.18);color:var(--blue);border:1px solid rgba(52,152,219,.35)}
.plan-badge.plan-pro{background:rgba(155,89,182,.18);color:var(--purple);border:1px solid rgba(155,89,182,.35)}
.plan-badge.plan-unknown{background:rgba(150,150,150,.18);color:#aaa;border:1px solid rgba(150,150,150,.35)}
/* V2 (MacD 2026-07-05): cached snapshot badge — surfaces when a provider
   is serving a stale fallback (e.g. Claude during Anthropic OAuth 429). */
.cached-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.7em;font-weight:600;background:rgba(241,196,15,.16);color:#f1c40f;border:1px solid rgba(241,196,15,.35);margin-left:6px;letter-spacing:.2px}
.cached-badge[data-stale="true"]{background:rgba(231,76,60,.16);color:#e74c3c;border-color:rgba(231,76,60,.4)}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.status-dot.dot-ok{background:var(--green)}
.status-dot.dot-bad{background:var(--danger)}
.status-dot.dot-warn{background:var(--warn)}

.copilot-row td{font-size:.95em}
.copilot-row .merged{display:flex;flex-direction:column;gap:6px;align-items:stretch}
.copilot-row .merged .row1{display:flex;justify-content:space-between;gap:14px;align-items:baseline;flex-wrap:wrap}
.copilot-row .merged .row1 .v{font-variant-numeric:tabular-nums;font-weight:600;color:var(--text)}
.copilot-row .merged .row1 .reset{color:var(--dim);font-size:.92em}
.copilot-row .merged .pct-bar-wrap{width:100%}

/* Responsive */

/* Default: desktop shows desktop-only cells, mobile-only hidden. */
.quota-table .mobile-only{display:none}

@media(max-width:1024px){
  .quota-table .col-plan-hide-mobile{display:none}
}
@media(max-width:900px){
  /* V2 (MacD 2026-07-05): extend mobile/stacked layout to small-tablet
     width so each model is rendered as a compact 3-line card rather than
     collapsing into a 5-row stack that pushes the deadline cells onto
     their own lines. */
  .quota-card{padding:18px}
  .quota-table thead{display:none}
  .quota-table,.quota-table tbody,.quota-table tr,.quota-table td{display:block;width:100%}
  .quota-table tbody tr{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .quota-table tbody tr:last-child{border-bottom:none}
  .quota-table td{padding:0;border:none}
  /* Toggle desktop/mobile variants — desktop-only hidden, mobile-only shown. */
  .quota-table .desktop-only{display:none !important}
  .quota-table .mobile-only{display:block !important}
  /* Agent name + plan badge sit inline on a single row. */
  .quota-table .col-agent{font-size:1.05em;display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .quota-table .col-agent .status-dot{flex-shrink:0}
  .quota-table .col-plan-inline{margin-left:2px;display:inline-flex;align-items:center;gap:6px}
  .quota-table .col-plan-hide-mobile{display:none}
  .pct-label{font-size:.7em;display:block;margin-bottom:2px}
  /* Group wrappers: agent | plan | pct-grid | reset-grid */
  .quota-row-pct,.quota-row-reset{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
  .quota-row-reset{margin-top:6px;font-size:.82em}
  .quota-table .col-num,.quota-table .col-reset{text-align:left}
  .quota-table .col-reset em{color:var(--text);font-style:normal;font-weight:500}
  .copilot-row .merged{grid-column:1 / -1}
  .quota-card-title{font-size:.95rem}
}

@media(max-width:480px){
  /* Very narrow phones: stack 5h/7d and reset labels vertically. */
  .quota-row-pct,.quota-row-reset{grid-template-columns:1fr;gap:6px}
}

/* ── Projects (unchanged from V1) ── */
.project-list{display:flex;flex-direction:column;gap:8px}
.project-card{background:var(--card);border-radius:10px;padding:14px 18px;cursor:pointer;transition:background .2s}
.project-card:hover{background:#1a2744}
.project-header{display:flex;align-items:center;gap:12px}
.project-card .icon{font-size:1.1rem;flex-shrink:0}
.project-card .name{flex:1;font-weight:600;font-size:.92em}
.project-card .meta{font-size:.72em;color:var(--dim);text-align:right}
.project-card .link{font-size:.72em;color:var(--blue);text-decoration:none;margin-left:8px}
.project-card .link:hover{text-decoration:underline}
.project-preview{max-height:0;overflow:hidden;transition:max-height .3s ease;font-size:.82em;color:var(--dim);line-height:1.5}
.project-preview.open{max-height:300px;overflow-y:auto}
.project-preview-inner{padding:10px 0 4px 28px;border-top:1px solid rgba(255,255,255,.06);margin-top:10px}
.project-preview-inner p{margin-bottom:6px}
.project-preview-inner code{background:rgba(255,255,255,.08);padding:1px 5px;border-radius:3px;font-size:.9em}
.expand-icon{font-size:.7em;color:var(--dim);transition:transform .2s;margin-left:4px}

@media(max-width:600px){
  .header{padding:12px 14px}
  .header h1{font-size:.95rem}
}
</style>
</head>
<body>

<div class="header">
  <h1><img src="images/logo.png" alt="Logo" class="header-logo">虛擬辦公室</h1>
  <div class="header-right">
    <span class="update" id="lastUpdate">更新: —</span>
    <a href="memory/">🧠 Memory</a>
    <a href="dashboard.html">📊 Dashboard →</a>

</div>

<div class="container">

  <div class="section-title" style="margin-bottom:14px">⚡ Agent 使用總覽</div>

  <div class="quota-card">
    <div class="quota-card-header">
      <div class="quota-card-title">⚡ Agent 配額</div>

        <tr>

        </tr>

      </tbody>
    </table>
  </div>

  <div class="section-title">📋 Projects</div>
  <div class="project-list" id="projectList"></div>

</div>

<script>
const projects = [
  // V2 (MacD 2026-07-05): refreshed against ai-lish's GitHub repos.
  // Sources: https://api.github.com/users/ai-lish/repos?sort=updated
  // (snapshot 2026-07-05) + MEMORY.md §My-Japan for that repo's date.
  // Sorted by recency of last commit. Active projects updated within the
  // last 60 days are 'active'; older-or-stalled are 'pending';
  // single-shot event sites are 'completed'. Static snapshot — refresh
  // by hand when new repos appear or statuses change.
  { name:'Assessments 測考工具', icon:'📝', status:'active', link:'https://github.com/ai-lish/Assessments', date:'2026-07-05', repo:'ai-lish/Assessments', desc:'測考工具 — 初中短答題目庫生成系統' },
  { name:'虛擬辦公室', icon:'🏢', status:'active', link:'https://ai-lish.github.io/virtual-office/', date:'2026-07-05', repo:'ai-lish/virtual-office', desc:'AI 助手工作狀態監控儀表板 — 配額 + cron + dashboard' },
  { name:'CloudSAMS 行政小工具', icon:'🏫', status:'active', link:'https://github.com/ai-lish/cloudsams-tools', date:'2026-07-02', repo:'ai-lish/cloudsams-tools', desc:'CloudSAMS 行政小工具 — 香港中學校務系統 admin utilities (PDF split, data export, batch reports)' },
  { name:'少康教學網站', icon:'📚', status:'active', link:'https://ai-lish.github.io/ai-learning/', date:'2026-06-28', repo:'ai-lish/ai-learning', desc:'HKDSE 數學教學資源網站 — DSE 試題庫 + AI 評分' },
  { name:'My-Japan PWA', icon:'🗾', status:'active', link:'https://ai-lish.github.io/My-Japan/', date:'2026-06-20', repo:'ai-lish/My-Japan', desc:'JLPT N1/N2 語音記憶字卡 + 日本隨身旅行日記 PWA' },
  { name:'PDF 分割工具', icon:'✂️', status:'active', link:'https://ai-lish.github.io/pdf-splitter/', date:'2026-06-09', repo:'ai-lish/pdf-splitter', desc:'PDF 分割工具 — 純前端，無需上傳，支援每 N 頁 / 範圍 / 指定頁' },
  { name:'圖片像素提升', icon:'🔍', status:'active', link:'https://ai-lish.github.io/image-upscaler/', date:'2026-06-06', repo:'ai-lish/image-upscaler', desc:'圖片像素提升工具 — 純前端 AI-style upscaler，離線可用' },
  { name:'數學週 2026', icon:'🎲', status:'active', link:'https://ai-lish.github.io/math-week-2026/', date:'2026-06-04', repo:'ai-lish/math-week-2026', desc:'2026 數學週活動網站' },
  { name:'MiniMax 工作坊', icon:'🛠️', status:'active', link:'https://ai-lish.github.io/minimax-workshop/', date:'2026-06-02', repo:'ai-lish/minimax-workshop', desc:'MiniMax API 全功能展示 — TTS、圖像生成、VLM、語音對話' },
  { name:'晞霖學習網站', icon:'👶', status:'active', link:'https://ai-lish.github.io/preschool/', date:'2026-05-24', repo:'ai-lish/preschool', desc:'幼兒教育互動學習平台' },
  { name:'Math RPG', icon:'⚔️', status:'active', link:'https://github.com/ai-lish/math-rpg', date:'2026-05-12', repo:'ai-lish/math-rpg', desc:'Math RPG — 數學戰鬥遊戲概念驗證' },
  { name:'冰火大戰', icon:'🔥', status:'active', link:'https://ai-lish.github.io/bingfo/', date:'2026-05-10', repo:'ai-lish/bingfo', desc:'冰火大戰 Ice & Fire — 整數策略卡牌遊戲規則網頁' },
  { name:'趣味數學題', icon:'🧮', status:'active', link:'https://ai-lish.github.io/fun-math/', date:'2026-05-06', repo:'ai-lish/fun-math', desc:'趣味數學題互動頁面' },
  { name:'平方包', icon:'🎴', status:'active', link:'https://ai-lish.github.io/square-bun/', date:'2026-05-05', repo:'ai-lish/square-bun', desc:'數學乘除法心算訓練卡牌遊戲' },
  { name:'60秒計算機大賽', icon:'⏱️', status:'active', link:'https://ai-lish.github.io/calculator-race/', date:'2026-05-02', repo:'ai-lish/calculator-race', desc:'60秒計算機大賽挑戰遊戲 — 60-second calculator race' },
  { name:'Zach AI Blog', icon:'✍️', status:'active', link:'https://ai-lish.github.io/zach-ai-blog/', date:'2026-04-27', repo:'ai-lish/zach-ai-blog', desc:'Zach AI 開發日誌' },
  { name:'Math RPG (Godot 4)', icon:'🎮', status:'active', link:'https://github.com/ai-lish/math-rpg-godot', date:'2026-04-22', repo:'ai-lish/math-rpg-godot', desc:'Math RPG - HKDSE Math Game built with Godot 4' },
  { name:'Song-of-Songs', icon:'🎵', status:'active', link:'https://ai-lish.github.io/Song-of-Songs/index.html', date:'2026-04-12', repo:'ai-lish/Song-of-Songs', desc:'歌詞影片製作專案 — Song of Songs YouTube 頻道自動化 (AI 詩歌)' },
  { name:'全方位學習日', icon:'🎯', status:'completed', link:'https://ai-lish.github.io/lsc-ole-s1-2026/', date:'2026-04-07', repo:'ai-lish/lsc-ole-s1-2026', desc:'S1 全方位學習日活動網站 (已完成)' },
  { name:'欠交功課系統', icon:'📋', status:'pending', link:'https://github.com/ai-lish/homework-duty-system', date:'2026-03-15', repo:'ai-lish/homework-duty-system', desc:'學生功課追蹤管理系統 (待重啟)' },
  { name:'教師發展日', icon:'🎓', status:'completed', link:'https://ai-lish.github.io/teacher-dev-day/', date:'2026-03-15', repo:'ai-lish/teacher-dev-day', desc:'教師專業發展日活動 (已完成)' }
];

const listEl = document.getElementById('projectList');
const statusIcon = { active:'🔄', completed:'✅', pending:'⏳' };
const statusLabel = { active:'進行中', completed:'已完成', pending:'待開始' };
projects.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'project-card';
  card.innerHTML = `
    <div class="project-header" onclick="togglePreview(${i})">
      <span class="icon">${statusIcon[p.status] || p.icon}</span>
      <span class="name">${p.name} <span class="expand-icon" id="expand-${i}">▶</span></span>
      <span class="meta">${p.date}</span>
      <a class="link" href="public/pages/project.html?repo=${encodeURIComponent(p.repo)}&name=${encodeURIComponent(p.name)}&desc=${encodeURIComponent(p.desc)}&status=${p.status}&date=${p.date}&link=${encodeURIComponent(p.link)}" onclick="event.stopPropagation()">詳情 →</a>
      <a class="link" href="${p.link}" target="_blank" onclick="event.stopPropagation()">開啟 →</a>
    </div>
    <div class="project-preview" id="preview-${i}">
      <div class="project-preview-inner">
        <p><strong>狀態:</strong> ${statusLabel[p.status] || p.status}</p>
        <p>${p.desc}</p>
        <p id="readme-${i}" style="color:var(--dim);font-size:.9em;">載入 README…</p>
      </div>
    </div>
  `;
  listEl.appendChild(card);
});

function togglePreview(i) {
  const el = document.getElementById('preview-' + i);
  const icon = document.getElementById('expand-' + i);
  const isOpen = el.classList.toggle('open');
  icon.textContent = isOpen ? '▼' : '▶';
  if (isOpen && !el.dataset.loaded) {
    el.dataset.loaded = '1';
    loadReadme(i);
  }
}

const readmeCache = {};
async function loadReadme(i) {
  const p = projects[i];
  if (!p.repo) return;
  const el = document.getElementById('readme-' + i);
  try {
    if (readmeCache[p.repo]) { el.innerHTML = readmeCache[p.repo]; return; }
    const res = await fetch(`https://api.github.com/repos/${p.repo}/readme`, { headers: { Accept: 'application/vnd.github.v3.raw' } });
    if (!res.ok) { el.textContent = '無法載入 README'; return; }
    const text = await res.text();
    let snippet = text.slice(0, 600)
      .replace(/^#+\s*/gm, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/!\[.*?\]\(.*?\)/g, '')
      .replace(/\n{3,}/g, '\n\n')
      .trim();
    if (text.length > 600) snippet += '…';
    const html = snippet.split('\n').map(l => `<p>${l || '&nbsp;'}</p>`).join('');
    readmeCache[p.repo] = html;
    el.innerHTML = html;
  } catch(e) { el.textContent = '載入失敗'; }
}

// ── Single quota table loader (per Planning §3.8) ──
const basePath = () => location.pathname.includes('/virtual-office') ? '/virtual-office' : '';
const planClass = (plan) => {
  const p = (plan || '').toLowerCase();
  if (p === 'plus') return 'plan-plus';
  if (p === 'pro') return 'plan-pro';
  return 'plan-unknown';
};
const statusDotClass = (data) => {
  if (!data) return 'dot-warn';
  if (data.available === false) return 'dot-bad';
  if (data.limit_reached) return 'dot-bad';
  return 'dot-ok';
};

// V2 (Zach 2026-06-28 regression): energy bars per quota cell.
// Thresholds mirror V1 /tmp/codex verdict: <50 green, 50-79 orange, 80-94 warn, >=95 danger.
// available=false forces danger color regardless of pct.
function pctColorClass(pct, available) {
    if (available === false) return 'pct-bar-color-bad';
    const safe = Number.isFinite(pct) ? pct : 0;
    if (safe >= 95) return 'pct-bar-color-crit';
    if (safe >= 80) return 'pct-bar-color-high';
    if (safe >= 50) return 'pct-bar-color-mid';
    return 'pct-bar-color-low';
}

function pctCellHTML(value, available) {
    if (value == null || !Number.isFinite(value)) {
        return `<div class="pct-cell"><span class="v muted">—</span><div class="pct-bar-wrap"><div class="pct-bar-fill pct-bar-color-bad" style="width:0%"></div></div></div>`;
    }
    const width = Math.max(0, Math.min(100, value));
    const colorCls = pctColorClass(value, available);
    return `<div class="pct-cell"><span class="v">${value}%</span><div class="pct-bar-wrap"><div class="pct-bar-fill ${colorCls}" style="width:${width}%"></div></div></div>`;
}

function fmtHkt(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return '—';
  return d.toLocaleString('zh-HK',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}

// V2 (MacD 2026-07-05): render "(cached Xh ago)" badge for cached snapshots.
// Shows whether the displayed data is fresh from the provider or served
// from a stale fallback during a transient outage (Anthropic OAuth 429 etc.).
function cachedBadgeHtml(provider) {
  if (!provider || !provider.cached) return '';
  const cachedAt = provider.cached_at;
  const dueTo = provider._cached_due_to || 'transient fetch failure';
  const ageSec = Number.isFinite(provider._cache_age_seconds)
    ? provider._cache_age_seconds
    : null;
  const ageLabel = ageSec != null ? formatAgeShort(ageSec) : '?';
  // Flag "stale" if older than 24h so the badge color changes from yellow
  // (warning) to red (clearly stale).
  const stale = ageSec != null && ageSec > 86400;
  const titleAttr = `Cached snapshot from ${cachedAt} (${ageLabel} old)\nReason: ${dueTo}`;
  return ` <span class="cached-badge"${stale ? ' data-stale="true"' : ''} title="${titleAttr.replace(/"/g, '&quot;')}">(cached ${ageLabel})</span>`;
}

function formatAgeShort(ageSec) {
  const sec = Math.max(0, Math.floor(ageSec));
  if (sec < 60) return `${sec}s`;
  if (sec < 3600) return `${Math.floor(sec / 60)}m`;
  if (sec < 86400) {
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return m > 0 ? `${h}h${m}m` : `${h}h`;
  }
  const d = Math.floor(sec / 86400);
  const h = Math.floor((sec % 86400) / 3600);
  return h > 0 ? `${d}d${h}h` : `${d}d`;
}

async function fetchJson(path, ts) {
  const res = await fetch(`${basePath()}${path}?${ts}`);
  if (!res.ok) throw new Error(`${path} ${res.status}`);
  return res.json();
}

async function loadQuotaTable() {
    const ts = Date.now();
    let lastUpdate = null;

    const [usage, minimax, copilot] = await Promise.allSettled([
        fetchJson('/public/usage-quota.json', ts),
        fetchJson('/public/minimax-api-status.json', ts),
        fetchJson('/public/copilot-summary.json', ts)
    ]);

    const codex = usage.status === 'fulfilled' ? usage.value.codex : null;
    const claude = usage.status === 'fulfilled' ? usage.value.claude : null;
    const geminiWeb = usage.status === 'fulfilled' ? usage.value.gemini_web : null;
    const mm = minimax.status === 'fulfilled' ? minimax.value : null;
    const cp = copilot.status === 'fulfilled' ? copilot.value : null;

    if (usage.status === 'fulfilled' && usage.value._generatedAt) {
        lastUpdate = new Date(usage.value._generatedAt);
    }
    if (minimax.status === 'fulfilled' && minimax.value._generatedAt) {
        const t = new Date(minimax.value._generatedAt);
        if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }
    if (copilot.status === 'fulfilled' && copilot.value._generatedAt) {
        const t = new Date(copilot.value._generatedAt);
        if (!lastUpdate || t > lastUpdate) lastUpdate = t;
    }

    const codex5h = codex?.primary_5h?.used_percent;
    const codex7d = codex?.secondary_7d?.used_percent;
    const claude5h = claude?.primary_5h?.used_percent;
    const claude7d = claude?.secondary_7d?.used_percent;
    const gemini5h = geminiWeb?.primary_5h?.used_percent;
    const gemini7d = geminiWeb?.secondary_7d?.used_percent;

    const general = mm?.allModels?.find(m => m.model === 'general');
    const mm5h = general ? Math.round(100 - (general.remainingPct ?? 100)) : null;
    const mmWeekly = general ? Math.round(100 - (general.weeklyRemainingPct ?? 100)) : null;
    const mm5hReset = general?.resetTime ? fmtHkt(general.resetTime) : '—';

    // Copilot: monthly aggregate
    const now = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const byMonth = cp?.analysis?.byMonth || {};
    let monthData = byMonth[month];
    let usedMonth = month;
    if (!monthData || monthData.total == null) {
        const months = Object.keys(byMonth).sort();
        if (months.length) {
            usedMonth = months[months.length - 1];
            monthData = byMonth[usedMonth];
        }
    }
    const nextReset = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString().slice(0, 10);
    const copilotUsed = monthData?.total ?? 0;
    const copilotTotal = 300;
    const copilotPct = copilotUsed > 0 ? Math.round(copilotUsed / copilotTotal * 100) : 0;
    const isFallback = usedMonth !== month;
    const monthLabel = isFallback ? `${usedMonth} (最新可用)` : month;

    const rows = [];

    // Codex
    rows.push(`
        <tr>
            <td class="col-agent desktop-only"><span class="status-dot ${statusDotClass(codex)}"></span>🤖 Codex</td>
            <td class="col-plan desktop-only"><span class="plan-badge ${planClass(codex?.plan)}">${(codex?.plan || '—').toUpperCase()}</span></td>
            <td class="col-num desktop-only">${pctCellHTML(codex5h, codex?.available)}</td>
            <td class="col-num desktop-only">${pctCellHTML(codex7d, codex?.available)}</td>
            <td class="col-reset desktop-only">${codex?.primary_5h?.reset_at_hkt ? `<em>${codex.primary_5h.reset_at_hkt}</em>` : '—'}</td>
            <td class="col-reset desktop-only">${codex?.secondary_7d?.reset_at_hkt ? `<em>${codex.secondary_7d.reset_at_hkt}</em>` : '—'}</td>
            <td colspan="6" class="mobile-only">
                <div class="col-agent"><span class="status-dot ${statusDotClass(codex)}"></span>🤖 Codex <span class="col-plan-inline"><span class="plan-badge ${planClass(codex?.plan)}">${(codex?.plan || '—').toUpperCase()}</span></span></div>
                <div class="quota-row-pct">
                    <div class="col-num"><span class="muted pct-label">5h</span>${pctCellHTML(codex5h, codex?.available)}</div>
                    <div class="col-num"><span class="muted pct-label">7d</span>${pctCellHTML(codex7d, codex?.available)}</div>
                </div>
                <div class="quota-row-reset">
                    <div class="col-reset"><span class="muted">Reset 5h:</span> ${codex?.primary_5h?.reset_at_hkt ? `<em>${codex.primary_5h.reset_at_hkt}</em>` : '—'}</div>
                    <div class="col-reset"><span class="muted">Reset 7d:</span> ${codex?.secondary_7d?.reset_at_hkt ? `<em>${codex.secondary_7d.reset_at_hkt}</em>` : '—'}</div>
                </div>
            </td>
        </tr>
    `);

    // Claude
    rows.push(`
        <tr>
            <td class="col-agent desktop-only"><span class="status-dot ${statusDotClass(claude)}"></span>🤖 Claude Code</td>
            <td class="col-plan desktop-only"><span class="plan-badge ${planClass(claude?.subscription)}">${(claude?.subscription || '—').toUpperCase()}</span>${cachedBadgeHtml(claude)}</td>
            <td class="col-num desktop-only">${pctCellHTML(claude5h, claude?.available)}</td>
            <td class="col-num desktop-only">${pctCellHTML(claude7d, claude?.available)}</td>
            <td class="col-reset desktop-only">${claude?.primary_5h?.reset_at_hkt ? `<em>${claude.primary_5h.reset_at_hkt}</em>` : '—'}</td>
            <td class="col-reset desktop-only">${claude?.secondary_7d?.reset_at_hkt ? `<em>${claude.secondary_7d.reset_at_hkt}</em>` : '—'}</td>
            <td colspan="6" class="mobile-only">
                <div class="col-agent"><span class="status-dot ${statusDotClass(claude)}"></span>🤖 Claude Code <span class="col-plan-inline"><span class="plan-badge ${planClass(claude?.subscription)}">${(claude?.subscription || '—').toUpperCase()}</span>${cachedBadgeHtml(claude)}</span></div>
                <div class="quota-row-pct">
                    <div class="col-num"><span class="muted pct-label">5h</span>${pctCellHTML(claude5h, claude?.available)}</div>
                    <div class="col-num"><span class="muted pct-label">7d</span>${pctCellHTML(claude7d, claude?.available)}</div>
                </div>
                <div class="quota-row-reset">
                    <div class="col-reset"><span class="muted">Reset 5h:</span> ${claude?.primary_5h?.reset_at_hkt ? `<em>${claude.primary_5h.reset_at_hkt}</em>` : '—'}</div>
                    <div class="col-reset"><span class="muted">Reset 7d:</span> ${claude?.secondary_7d?.reset_at_hkt ? `<em>${claude.secondary_7d.reset_at_hkt}</em>` : '—'}</div>
                </div>
            </td>
        </tr>
    `);

    // Gemini Web (consumer gemini.google.com)
    // Backend: scripts/fetch-usage.py fetch_gemini_web() via Playwright + jSf9Qc
    // RPC. Cache fallback handled server-side via usage-quota-cache-gemini-web.json
    // — cachedBadgeHtml mirrors the Claude cache UX.
    rows.push(`
        <tr>
            <td class="col-agent desktop-only"><span class="status-dot ${statusDotClass(geminiWeb)}"></span>✨ Gemini Web</td>
            <td class="col-plan desktop-only"><span class="plan-badge ${planClass(geminiWeb?.plan)}">${(geminiWeb?.plan || '—').toUpperCase()}</span>${cachedBadgeHtml(geminiWeb)}</td>
            <td class="col-num desktop-only">${pctCellHTML(gemini5h, geminiWeb?.available)}</td>
            <td class="col-num desktop-only">${pctCellHTML(gemini7d, geminiWeb?.available)}</td>
            <td class="col-reset desktop-only">${geminiWeb?.primary_5h?.reset_at_hkt ? `<em>${geminiWeb.primary_5h.reset_at_hkt}</em>` : '—'}</td>
            <td class="col-reset desktop-only">${geminiWeb?.secondary_7d?.reset_at_hkt ? `<em>${geminiWeb.secondary_7d.reset_at_hkt}</em>` : '—'}</td>
            <td colspan="6" class="mobile-only">
                <div class="col-agent"><span class="status-dot ${statusDotClass(geminiWeb)}"></span>✨ Gemini Web <span class="col-plan-inline"><span class="plan-badge ${planClass(geminiWeb?.plan)}">${(geminiWeb?.plan || '—').toUpperCase()}</span>${cachedBadgeHtml(geminiWeb)}</span></div>
                <div class="quota-row-pct">
                    <div class="col-num"><span class="muted pct-label">5h</span>${pctCellHTML(gemini5h, geminiWeb?.available)}</div>
                    <div class="col-num"><span class="muted pct-label">7d</span>${pctCellHTML(gemini7d, geminiWeb?.available)}</div>
                </div>
                <div class="quota-row-reset">
                    <div class="col-reset"><span class="muted">Reset 5h:</span> ${geminiWeb?.primary_5h?.reset_at_hkt ? `<em>${geminiWeb.primary_5h.reset_at_hkt}</em>` : '—'}</div>
                    <div class="col-reset"><span class="muted">Reset 7d:</span> ${geminiWeb?.secondary_7d?.reset_at_hkt ? `<em>${geminiWeb.secondary_7d.reset_at_hkt}</em>` : '—'}</div>
                </div>
            </td>
        </tr>
    `);

    // MiniMax
    rows.push(`
        <tr>
            <td class="col-agent desktop-only"><span class="status-dot ${statusDotClass({available: !!general})}"></span>🤖 MiniMax</td>
            <td class="col-plan desktop-only"><span class="plan-badge ${planClass(mm?.plan)}">${(mm?.plan || 'plus').toUpperCase()}</span></td>
            <td class="col-num desktop-only">${pctCellHTML(mm5h, !!general)}</td>
            <td class="col-num desktop-only">${pctCellHTML(mmWeekly, !!general)}</td>
            <td class="col-reset desktop-only">${mm5hReset !== '—' ? `<em>${mm5hReset}</em>` : '—'}</td>
            <td class="col-reset desktop-only">—</td>
            <td colspan="6" class="mobile-only">
                <div class="col-agent"><span class="status-dot ${statusDotClass({available: !!general})}"></span>🤖 MiniMax <span class="col-plan-inline"><span class="plan-badge ${planClass(mm?.plan)}">${(mm?.plan || 'plus').toUpperCase()}</span></span></div>
                <div class="quota-row-pct">
                    <div class="col-num"><span class="muted pct-label">5h</span>${pctCellHTML(mm5h, !!general)}</div>
                    <div class="col-num"><span class="muted pct-label">週</span>${pctCellHTML(mmWeekly, !!general)}</div>
                </div>
                <div class="quota-row-reset">
                    <div class="col-reset"><span class="muted">Reset 5h:</span> ${mm5hReset !== '—' ? `<em>${mm5hReset}</em>` : '—'}</div>
                    <div class="col-reset"><span class="muted">週剩餘:</span> <em>${mm?.allModels?.find(m => m.model === 'general')?.weeklyResetTime ? fmtHkt(mm.allModels.find(m => m.model === 'general').weeklyResetTime) : '—'}</em></div>
                </div>
            </td>
        </tr>
    `);

    // Copilot (colspan merge row)
    const copilotBarColor = pctColorClass(copilotPct, !!cp);
    rows.push(`
        <tr class="copilot-row">
            <td class="col-agent desktop-only"><span class="status-dot ${statusDotClass({available: !!cp})}"></span>🤖 GitHub Copilot</td>
            <td class="col-plan desktop-only"><span class="plan-badge ${planClass(cp?.subscription)}">${(cp?.subscription || '—').toUpperCase()}</span></td>
            <td colspan="4" class="desktop-only">
                <div class="merged">
                    <div class="row1">
                        <span class="v">本月 ${copilotPct}% (${copilotUsed}/${copilotTotal}) · ${monthLabel}</span>
                        <span class="reset">Reset ${nextReset}</span>
                    </div>
                    <div class="pct-bar-wrap"><div class="pct-bar-fill ${copilotBarColor}" style="width:${Math.max(0, Math.min(100, copilotPct))}%"></div></div>
                </div>
            </td>
            <td colspan="6" class="mobile-only">
                <div class="col-agent"><span class="status-dot ${statusDotClass({available: !!cp})}"></span>🤖 GitHub Copilot <span class="col-plan-inline"><span class="plan-badge ${planClass(cp?.subscription)}">${(cp?.subscription || '—').toUpperCase()}</span></span></div>
                <div class="merged">
                    <div class="row1">
                        <span class="v">本月 ${copilotPct}% (${copilotUsed}/${copilotTotal}) · ${monthLabel}</span>
                        <span class="reset">Reset ${nextReset}</span>
                    </div>
                    <div class="pct-bar-wrap"><div class="pct-bar-fill ${copilotBarColor}" style="width:${Math.max(0, Math.min(100, copilotPct))}%"></div></div>
                </div>
            </td>
        </tr>
    `);

    document.getElementById('quota-table-body').innerHTML = rows.join('');

    if (lastUpdate) {
        document.getElementById('quota-updated').textContent = '更新: ' + lastUpdate.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
        document.getElementById('lastUpdate').textContent = '更新: ' + lastUpdate.toLocaleTimeString('zh-HK', {hour:'2-digit', minute:'2-digit'});
    }
}

loadQuotaTable();
setInterval(loadQuotaTable, 300000);
</script>
