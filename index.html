<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>虛擬辦公室 - Virtual Office</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f23;
            --bg-medium: #1a1a2e;
            --bg-light: #16213e;
            --accent: #bc002d;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.6);
            --japanese-red: #bc002d;
        }

        body {
            font-family: 'Noto Sans SC', 'Zen Maru Gothic', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===============================
           TOP BAR - Fixed Agent Status
           =============================== */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(90deg, var(--bg-medium) 0%, var(--bg-light) 100%);
            border-bottom: 2px solid var(--japanese-red);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }

        .agent-bar {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .agent-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .agent-mini .avatar {
            font-size: 1.2rem;
        }

        .agent-mini .name {
            font-weight: 500;
        }

        .agent-mini .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .agent-mini .status-dot.active {
            background: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .agent-mini .status-dot.idle {
            background: #ff9800;
        }

        .agent-mini .status-dot.offline {
            background: #666;
        }

        .system-info {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .mode-badge {
            padding: 4px 10px;
            background: rgba(33,150,243,0.3);
            border-radius: 12px;
            color: #2196f3;
            font-weight: 500;
        }

        .update-time {
            color: var(--text-secondary);
        }

        /* ===============================
           MAIN APP LAYOUT
           =============================== */
        .app-container {
            display: flex;
            min-height: 100vh;
            padding-top: 60px; /* Space for top bar */
        }

        /* ===============================
           SIDEBAR - Left 1/3
           =============================== */
        .sidebar {
            width: 33.33%;
            min-width: 280px;
            max-width: 350px;
            background: linear-gradient(180deg, var(--bg-medium) 0%, var(--bg-dark) 100%);
            border-right: 2px solid var(--japanese-red);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 60px);
            position: fixed;
            top: 60px;
            left: 0;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .logo:hover {
            background: rgba(188,0,45,0.2);
        }

        .logo-icon {
            font-size: 1.8rem;
        }

        .logo-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }

        .nav-menu {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: rgba(188,0,45,0.2);
            color: #fff;
        }

        .nav-item.active {
            background: var(--japanese-red);
            color: #fff;
        }

        .sidebar-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-left: 5px;
        }

        /* Project List */
        .project-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .project-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .project-item:hover {
            background: rgba(188,0,45,0.15);
            border-color: rgba(188,0,45,0.3);
        }

        .project-item.selected {
            background: rgba(188,0,45,0.25);
            border-color: var(--japanese-red);
        }

        .project-status-icon {
            font-size: 1rem;
        }

        .project-name {
            flex: 1;
            font-weight: 500;
            color: #fff;
        }

        .project-expand {
            color: var(--text-secondary);
            font-size: 0.8rem;
            transition: transform 0.2s;
        }

        .project-item.expanded .project-expand {
            transform: rotate(180deg);
        }

        /* Project Details (Expanded) */
        .project-details {
            display: none;
            width: 100%;
            padding: 12px 0 0;
            margin-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .project-item.expanded .project-details {
            display: block;
        }

        .project-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .project-summary {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .project-link {
            font-size: 0.8rem;
            color: #64b5f6;
            text-decoration: none;
        }

        .project-link:hover {
            text-decoration: underline;
        }

        /* ===============================
           MAIN CONTENT - Right 2/3
           =============================== */
        .main-content {
            flex: 1;
            margin-left: 33.33%;
            min-width: 0;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 50%, var(--bg-light) 100%);
            min-height: calc(100vh - 60px);
            position: relative;
        }

        /* Home View - Virtual Office Hero */
        .home-view {
            padding: 40px;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }

        /* Project Detail View */
        .detail-view {
            display: none;
            padding: 40px;
            min-height: 100%;
        }

        .detail-view.active {
            display: block;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--japanese-red);
        }

        .detail-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .detail-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .detail-status.active {
            background: rgba(76,175,80,0.2);
            color: #4caf50;
        }

        .detail-status.completed {
            background: rgba(33,150,243,0.2);
            color: #2196f3;
        }

        .detail-status.standby {
            background: rgba(255,152,0,0.2);
            color: #ff9800;
        }

        .back-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(188,0,45,0.5);
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .info-value {
            color: #fff;
            font-size: 0.95rem;
        }

        .info-value a {
            color: #64b5f6;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        /* Timeline */
        .timeline-section {
            margin-top: 30px;
        }

        .timeline-title {
            font-size: 1.1rem;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 3px solid var(--japanese-red);
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--japanese-red), rgba(188,0,45,0.3));
        }

        .timeline-item {
            position: relative;
            padding-bottom: 25px;
        }

        .timeline-item::before {
            content: '';
            position: absolute;
            left: -26px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--japanese-red);
        }

        .timeline-date {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .timeline-event {
            color: #fff;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .timeline-detail {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
        }

        /* ===============================
           MOBILE - Hamburger Menu
           =============================== */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 1001;
            background: var(--japanese-red);
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(188,0,45,0.4);
        }

        .mobile-menu-btn span {
            display: block;
            width: 22px;
            height: 2px;
            background: #fff;
            margin: 5px 0;
            border-radius: 2px;
        }

        /* ===============================
           RESPONSIVE
           =============================== */
        @media (max-width: 768px) {
            .mobile-menu-btn {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                width: 100%;
                height: calc(100vh - 60px);
                transform: translateX(-100%);
                z-index: 999;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
                width: 100%;
            }

            .agent-bar {
                gap: 8px;
            }

            .agent-mini {
                padding: 4px 8px;
                font-size: 0.75rem;
            }

            .agent-mini .name {
                display: none;
            }

            .system-info {
                font-size: 0.7rem;
            }

            .hero-title {
                font-size: 1.6rem;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar {
                width: 35%;
                min-width: 280px;
            }

            .main-content {
                margin-left: 35%;
            }
        }
    </style>
</head>

        // ===============================
        let selectedProject = null;
        let expandedProject = null;

        // ===============================
        // DOM ELEMENTS
        // ===============================
        const projectListEl = document.getElementById('projectList');
        const homeViewEl = document.getElementById('homeView');
        const detailViewEl = document.getElementById('detailView');
        const sidebarEl = document.getElementById('sidebar');
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const logoBtn = document.getElementById('logoBtn');
        const backBtn = document.getElementById('backBtn');
        const updateTimeEl = document.getElementById('updateTime');

        // ===============================
        // RENDER FUNCTIONS
        // ===============================
        function renderProjects() {
            projectListEl.innerHTML = projects.map((p, i) => `
                <div class="project-item ${expandedProject === i ? 'expanded' : ''} ${selectedProject === i ? 'selected' : ''}" data-index="${i}">
                    <span class="project-status-icon">${p.status === 'completed' ? '✅' : p.status === 'active' ? '🔄' : '⏳'}</span>
                    <span class="project-name">${p.name}</span>
                    <span class="project-expand">▼</span>
                    <div class="project-details">
                        <div class="project-date">開始：${p.startDate}</div>
                        <div class="project-summary">${p.summary}</div>
                        ${p.link ? `<a class="project-link" href="${p.link}" target="_blank">開啟網站 →</a>` : '<span class="project-link">開發中...</span>'}
                    </div>
                </div>
            `).join('');

            // Add click handlers
            document.querySelectorAll('.project-item').forEach(item => {
                item.addEventListener('click', () => {
                    const index = parseInt(item.dataset.index);
                    toggleProject(index);
                });
            });
        }

        function showProjectDetail(index) {
            const p = projects[index];
            
            document.getElementById('detailTitle').textContent = p.name;
            document.getElementById('detailStatus').textContent = p.statusText;
            document.getElementById('detailStatus').className = 'detail-status ' + p.status;
            document.getElementById('detailStart').textContent = p.startDate;
            document.getElementById('detailTarget').textContent = p.targetDate;
            document.getElementById('detailLink').innerHTML = p.link 
                ? `<a href="${p.link}" target="_blank">${p.link}</a>` 
                : '開發中...';
            document.getElementById('detailGithub').innerHTML = `<a href="${p.github}" target="_blank">${p.github}</a>`;
            document.getElementById('detailDesc').textContent = p.description;

            // Render timeline
            document.getElementById('detailTimeline').innerHTML = p.timeline.map(t => `
                <div class="timeline-item">
                    <div class="timeline-date">${t.date}</div>
                    <div class="timeline-event">${t.event}</div>
                    <div class="timeline-detail">${t.detail}</div>
                </div>
            `).join('');

            homeViewEl.style.display = 'none';
            detailViewEl.classList.add('active');
        }

        function showHome() {
            selectedProject = null;
            expandedProject = null;
            detailViewEl.classList.remove('active');
            homeViewEl.style.display = 'flex';
            renderProjects();
            closeSidebar();
        }

        function toggleProject(index) {
            // If clicking same project, just toggle expansion
            if (selectedProject === index) {
                expandedProject = expandedProject === index ? null : index;
            } else {
                // Select new project, expand it
                selectedProject = index;
                expandedProject = index;
            }
            
            renderProjects();
            showProjectDetail(index);
            closeSidebar();
        }

        // ===============================
        // MOBILE MENU
        // ===============================
        function toggleSidebar() {
            sidebarEl.classList.toggle('open');
        }

        function closeSidebar() {
            sidebarEl.classList.remove('open');
        }

        // ===============================
        // SIMULATE AGENT STATUS UPDATE
        // ===============================
        function updateAgentStatus() {
            const now = new Date();
            updateTimeEl.textContent = '更新: ' + now.toLocaleTimeString('zh-HK', { hour: '2-digit', minute: '2-digit' });
            
            // Simulate status changes
            const statuses = ['active', 'idle', 'offline'];
            const brainStatus = 'active'; // Always active
            const testerStatus = statuses[Math.floor(Math.random() * 3)];
            const devStatus = statuses[Math.floor(Math.random() * 3)];
            
            document.getElementById('dot-brain').className = 'status-dot ' + brainStatus;
            document.getElementById('dot-tester').className = 'status-dot ' + testerStatus;
            document.getElementById('dot-dev').className = 'status-dot ' + devStatus;
        }

        // ===============================
        // INITIALIZE
        // ===============================
        function init() {
            renderProjects();
            
            // Event listeners
            mobileMenuBtn.addEventListener('click', toggleSidebar);
            logoBtn.addEventListener('click', showHome);
            backBtn.addEventListener('click', showHome);
            
            // Nav items
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', showHome);
            });

            // Update agent status
            updateAgentStatus();
            setInterval(updateAgentStatus, 30000);
        }

        init();
    </script>
</body>
</html>
