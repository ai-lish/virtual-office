name: E2E Playwright

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: |
          npm ci
          npm i playwright --no-audit --no-fund
          npx playwright install --with-deps
      - name: Run E2E Playwright
        run: node ./scripts/e2e-playwright.js
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: artifacts/**
