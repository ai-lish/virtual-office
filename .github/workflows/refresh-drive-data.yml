name: Refresh Copilot & Token Data

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Which data to refresh'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - copilot
          - token
  schedule:
    - cron: '30 0,6,12,18 * * *'  # Every 6 hours at :30

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install gog CLI
        run: npm install -g gogcli || true

      - name: Refresh Copilot Data
        if: ${{ github.event.inputs.source != 'token' }}
        env:
          GOG_TOKEN: ${{ secrets.GOG_TOKEN }}
        run: |
          echo "Fetching latest Copilot CSV from Google Drive..."
          # This step would need gog auth configured in CI
          # For now, the local script handles this via: scripts/refresh-data.sh copilot
          echo "⚠️ Copilot refresh requires local gog auth. Use scripts/refresh-data.sh locally."

      - name: Refresh Token Data
        if: ${{ github.event.inputs.source != 'copilot' }}
        env:
          GOG_TOKEN: ${{ secrets.GOG_TOKEN }}
        run: |
          echo "Fetching latest MiniMax billing CSV from Google Drive..."
          echo "⚠️ Token refresh requires local gog auth. Use scripts/refresh-data.sh locally."

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-refresh data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
